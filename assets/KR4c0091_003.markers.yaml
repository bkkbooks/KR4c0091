  - {type: variant, offset: 5, length: 170, content: 卷第三五十首磨笄山官渡虞坂秦庭延平津金義嶺瑶池啇郊銅柱関西畨禺咸陽髙陽池瀘水云亭細栁營葉縣射熊館頴川八公山夾谷杜郵柯亭綿山葛陂鄧城驌驦陂栢舉緱山塗山䂊州愽浪沙隴西白帝城灞岸濮水魯城房陵牛渚癈丘山朝歌谷口武陵溪流沙大澤傅巖澠池峴山四皓滎陽磨笄山春草綿綿岱曰低山邊立馬歎磨笄黄鸎也似追前事來向夫人死處啼春秋云昔趙侯其子㐮子伐岱侯侯戰㐮子於岱山之, WYG: 巻}
