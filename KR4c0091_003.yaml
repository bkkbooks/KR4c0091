body:
  text: 虞坂悠悠虞坂路欹斜遲曰和風簇野花未省孫陽身殁後幾多騏驥困鹽車史記云李伯樂字孫陽善相馬行至虞之山坂有鹽車亦至此歇其駕車中有一馬乃龍馬而人不别用駕鹽車遙見伯樂乃嘶伯樂遂以所騎之馬換之乃行千里之蹄也此謂自伯樂死後人多不别不知有幾匹駿馬困於鹽車之下也秦庭楚國君臣草莽間吳王戈甲未東還包胥不動咸陽哭爭得秦兵出武關春秋云昔五子胥將吳軍攻楚國路至於折郢有申包胥楚人也入秦乞兵救楚秦王不許包胥乃入秦庭倚墻大哭七日七夜聲不暫歇九頓首於地秦王感其志切乃發兵救楚於戰吳軍遂退楚國獲存包胥㱕楚楚王封之五千戶包堅不受㱕楚為有先人墳墓在楚地也夫申包者折憂國誠堅請師志切慟秦庭之終疾遂干戈之解圍觀此之尽忠可知臣節也延平津延平津路水溶溶峭壁巍岑一万重昨夜七星潭底見分明神劒化為龍晋書太史云有碧氣一條上衝牛斗折問客張華曰此是寶劒之氣在豐城縣乃謂雷煥曰可掘而尋之此劒煥至豐城縣乃修獄掘得石函函中有二寶劒煥乃送一劒與華而留一劒自佩後佩劒行至延平津其劒空而墜水後張華次子佩一劒亦至此其劒折乃於水躍出似龍形折其一劒在函中而化為龍二龍相逐皆沉於水故號神劒化為龍也夫非常之丗即非常之士必遇非常之物此之至寶不可遇焉金義嶺鑿開山嶺引湘波上去昭回不校多無限鵲臨橋畔立適來將道過天河此水連湘江其源髙故曰天河丗說七夕鵲填天河故胡氏有斯句未見穿鑿之始不書表節之丈瑶池阿母瑶池宴穆王九天仙樂送瓊漿謾矝八駿行如電㱕到人間國巳亡史記云周穆王有八駿各有名稱皆日行千里穆王每乘之往瑶池與西王母宴㑹四海奔逐不治國政宗廟折廢㱕至人間周國巳破矣夫物類過常者訛也自古帝王用言節故使淳風𬒳於寰海儉約化於黎無祥瑞者非醴泉芝草之分皆為然也啇郊鶯轉啇郊百草新殷湯遺跡在荒榛誰知繼傑為天子便是當時呪網人史記曰湯王姓姒名履字天乙未遇時至商郊見野人張綱而呪之曰欲東來者入吾網中欲南來者入吾網中欲西來者入吾網中欲北來者入吾網中邑令乃王密為昌從天來者從地來者四維上下悉皆入吾網中而湯聞之失聲曰尽矣乃除其網四靣只留一靣而呪之曰欲東任東欲西任西欲南任南欲北任北欲上欲下四維八方一任所往吾取其犯命者矣天下聞之皆為湯王仁德四十餘國並㱕於湯夏帝桀紂無道遂舉兵伐之湯自稱天子號殷武帝也銅柱一柱髙標險塞垣南蠻不敢犯中原功成自合分茅土何事翻銜薏苡冤後漢書云伏波將軍馬援征南蠻於安南道立銅柱以為漢界而南蠻攝侯不敢浸漢為功成罷兵歸闕而接遇南地瘴而有疾遂䭾載折南地薏苡于㱕瘴疾彼賢臣竇憲譛援投蠻金以䭾載㱕援遂獲罪不得封侯矣此為援征蠻有功不得分茅列土而翻得罪謂援冤矣關西楊震幽魂下北邙關西蹤跡遂荒涼四知美譽留人丗應與乾坤共久長漢書云楊震字伯起華隂人也為漢太守忠賢常謂帝曰臣恨生國外帝乃移關西退五百里令震居關內故號楊震閞西四知者震常舉王密美後懷金與震用答深恩云無人知震曰有天知地知子知我知四知遂不受金也畨禺重岡復嶺勢崔嵬一卒當關万卒回不是大夫多辨說尉他爭肯築朝臺漢書云趙他為南越尉故曰尉他也自據南越獨稱天子不伏朝漢漢欲伐之為路阻險乃使大夫陸賈折往說之令降折他遂於蠻地遙築臺朝漢主至今見在管嶺南雍府也大夫陸賈者楚人也漢帝以有辨詞常留左右令說趙他趙他乃信見陸賈賈乃下說詞尉他大恱乃築臺望漢帝乃拜他為越王陸賈為太中大夫也夫小不事大而春秋所誅善說者能成大事善謀者能立功是知一分之明言不役万夫之舉甲也咸陽一朝閻樂統群凶二丗朝廷掃地空唯有渭川流不盡至今猶繞望夷宫後語云秦始皇崩趙髙謀立胡亥為折帝號二丗皇帝帝用趙髙為丞相髙欲􅌹權恐人心不隨乃取苑中鹿進與帝以為馬帝曰鹿髙曰馬而帝問左右左右皆隨髙言是馬輒有言是鹿者髙必煞之髙遂專摧縱暴左右無敢言者後天下亂盜賊起帝頻以盜賊事責髙不治髙懼誅乃令女壻閻樂領兵入宫煞矣兵遂至樂謂帝曰奉命取足下惟足下裁帝曰願為一郡王樂曰不可帝曰願封万戶侯樂曰不可帝曰願作一黔首樂曰不可揮劒進前帝自殺矣樂遂不掠宫殿也望夷宫乃秦王之宫在咸陽也夫帝王登佐納籙丞乾返衆為之混元致羣生於人壽遂使玄功下騭聲德升間何縱逸於奢華乃致危亡於宗社千兵咸至一死何逃也髙陽池古人未遇即銜杯所貴愁腸得酒開何事山公持玉節等間深入醉鄉來晋書曰山濤字子簡折為荆州牧荆士豪庶有園池名髙陽池于簡每遊焉故歌曰置酒醉酩酊倒載千戈㱕時時能騎馬倒著白接籬也夫尋興追遊放情縱懌泛中山之九醖秦妙寺之八音承醉嵬昻實為暢矣瀘水五月驅兵入不毛月明瀘水瘴煙髙誓將雄略酬三顧豈憚征蠻七縱勞蜀志云諸葛武侯五月驅兵征雲南雲南瀘水五月渡之不得多瘴氣也武侯渡之其蠻地其瘴毒燋奦無草生故曰不毛也武侯戰擒蠻王而問汝伏我也蠻王曰我不伏我失計為君擒之武侯乃放令㱕治兵再戰又擒之如是七度後蠻乃叩頭曰某實伏將軍之神武故號七擒七縱謂武侯放而七度擒之也三顧者謂武侯昔居南陽先主三度自至武侯之家咨以當時之事武侯方起佐於先生故曰三顧也是三遇折也夫勤節酬君盜陽去難展七擒之略酬三顧之恩每觀作用之機實為英賢之事云亭一上髙亭曰正晡青山重疊片雲無万年松樹不知數若箇蚪枝是大夫秦始皇封禪於太山值其折夜雨昏暗不知道路乃住軍不行至昏霧開乃見有五株松樹因封為大夫在雲亭也細栁營文帝鑾輿勞去聲北征條侯此地整嚴兵轅門不峻將軍令今日爭知細栁營漢書云文帝時遣周亞夫等三將將兵北伐帝曰勞軍於城外約到棘門徐厲勞軍棘門將音樂迎帝帝至霸上霸上劉禮亦迎帝帝至細栁營細栁周亞夫乃閉營門號令三軍嚴備而帝乃遣告云上親勞軍於細栁亞夫乃令門吏皆執鋭弓持弩滿天子前驅至不得入前驅者曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔也於是帝使人持莭詔將軍亞夫乃傳令開門尉曰軍內不得驅馳天子乃按轡徐行至中營見亞夫亞夫揖帝曰介胄在身不拜亞夫命帝座而令三軍上自勞軍士等莫憚驅馳折勞訖帝出亞夫曰介胄之士不送折帝乃歎曰此真軍也適來霸上棘門乃童兒戲也細栁地名乃周亞夫之營也條侯乃封周亞夫也夫軍法將身正不令而行將身不正雖令也不行周亞夫身正行令豈不峻哉葉縣葉公丘墓巳塵埃雲矗崇墉亦半摧借問往年龍見日幾多風雨送將來史記曰葉公悉好看龍其門庭宇皆盡看之後感得天為之現龍公見而驚懼失魂其不措矣是故子張云葉公好折龍似龍其龍也乃真龍降而公驚失魂魄矣射熊館漢帝荒唐不解憂大誇畋獵廢農收子雲徒獻長楊賦肯念髙皇沭雨秋漢書曰漢帝荒政治好畋獵田外田籌皆廢農收楊雄字子雲蜀人也有間出之才仕漢漢帝畋獵起射熊館而不農桑雄乃作長楊賦字髙祖初定天下艱折難之事進以諌帝帝賢之也夫帝道者玄風暗運至德流通使道冠三皇功逾五帝永隆鴻業廣奐清篇何荒政鼓特致諷言顯過也頴川古賢髙尚不爭名行止由來動沓冥今曰浪為千里客看花慙上德星亭古史云頴川郡陳實賢髙尚不仕夜與諸子話論道德之事感德星為之聚見大史官占曰陳實之分野乃築亭於折實家陳之德義號曰德星亭夫德者上感星辰下服神道故曰災福一德也八公山符堅舉國出西秦東晉危如纍卯晨誰料此山諸草木盡能排難化為人南史云東晉孝武時胡賊苻堅稱秦於長安堅舉國興兵代晉先於長安賔舍而俟虜晋帝㱕而封之堅甚敬道安法師道折安勸帝不令伐晋曰今牛斗鎮四星行渡皆在於南方翼之間又君平日方越乃陛下之重臣乎陽公融帝弟皆言晋不可伐况又侯王猛存日臨死囑陛下曰臣死之後願陛下勿與南方構患令彼有謝安晋不可圖也堅曰秦強若泰山披東晋弱如鴻毛也彼不伏於朕朕今滅之一同天下豈不美也乃舉兵伐晋晋謝安乃舉弟玄將兵八千拒之肥水玄乃謀曰彼有百万之衆今臨肥水當謂令退軍五里我過江而戰堅人却魚侯我軍半渡而擊之且彼若揮軍而却首尾不應後軍必謂前敗而走我乘而破之堅果許立渡而揮軍退後軍不知將道軍敗而走晋軍乘其便而擊之大破秦軍斬堅弟融射傷堅走是日南風吼於秦軍之上若交戰於擊鬪之聲山煙木樹皆如人馬故論曰風驚鶴唳盡為戰鬪之聲草木山煙悉為人馬之狀晋自避賊南渡至此一百餘年此方雪積代之耻也夾谷夾谷鶯啼三月天野花芳草整相鮮來遲不見朱儒死空笑齊人失措年杜郵自古功成禍亦侵武安冤向杜郵深五胡煙月無窮水何事遷延到陸沉文選曰平地而陷身為陸沉折也後語云秦昭王以白起為將伐韓魏於伊闕斬二十四万又伐楚取冤郢復武鄢郢燒夷陵宫以郢為南郡秦王封起為武安君君又攻折魏於華陽北入圍大梁虜三晋將斬首十三万復與趙將賈夔戰坑趙卒三万人於河自是白起威震天下為秦攻城略地侵諸侯七十餘城十七年秦遂大霸後與趙將馬服子趙括戰於長平祚敗以四十万降起起並坑之進軍圍趙邯鄲而軍糧不屬乃遣使告折秦王請益軍糧滅趙秦玉許之𬒳原侯范睢知其滅趙功髙位居於上乃謂昭王曰今趙軍雖破秦亦傷衆白起但為巳身夲使成功不能連為社稷折憂万姓困於逺輸國內空虛臣恐楚魏乘虛攻秦願王釋趙且息万姓一二年復攻滅趙未晚王遂罷白起之兵後年復欲攻趙武安君諫曰不可王曰前以國虛民困君不量万姓之力求益軍糧而滅趙今秦人息民養兵士積糧食三軍二俸有倍於前而君曰不可也武安君奏曰長平之事秦軍大剋趙卒大敗不遂其時乘機破之今王發軍雖倍於前趙之備守者十倍矣趙自長平之後君臣憂懼上下困心早朝晏退崇籂子女四靣出嫁結親燕魏連好齊楚積慮并心備秦為務其國實其城堅人心固以此觀之趙未可伐也王曰寡人巳興師矣遣王陵伐趙陵戰敗王欲使武安君去起稱有疾不行王使范睢責之睢曰楚地方五千里帶甲軍百万人君前將軍十万人入楚一戰而扳鄢郢再戰而燒其宫庿三戰而辱楚王又韓魏二國興兵甚衆君將兵不能其半破之於伊闕斬首二十四万天下莫不震怒沉今趙軍死扜長平十巳七八矣其國弱是以王發軍人數多趙國之衆願使君將而滅趙且君常以少擊衆取勝如神况以強擊寡武安君曰昔楚上持國大不恤而羣臣妬功良臣遂百姓離心兵無鬪志又無偹守起所以得便引兵入深入韓魏二國爭便其力不齊故起得設將兵破之是故立功者計万刑勢何之有爭且秦滅趙軍於長平不逺此時乘其恐懼破之且冝捨之其今得耕稼以益孤幼以益其衆治甲兵以益其強髙壘後地以益其國折而今伐趙排其軍必不出戰圍其都必不剋攻其城必不捉兵久無功諸侯心生外起必至起見其害不見其利有病不能行應侯慙退告王王怒曰無白起寡人不能滅趙乎乃益發軍更使王齓將伐趙王陵圍趙數月不下頻戰不利武安君曰不取折我計今果中矣秦王聞之怒自至見武安君王曰君雖病強起為寡人計而將兵戰之有功無功寡人願也如君不允寡人恨之武安君頓首曰臣強行無㓛得免於罪不行雖無罪不免誅然猶大王聽臣愚計釋趙且養民以觀諸侯之變而誅滅無道而今天下王業可定折何先趙折為先乎王必折若決心於趙而致臣二人罪㱕為天下笑願王深察已聞明主憂其國忠臣憂其名寧伏受重誅不忍茍生為辱之將願大王察之王不答而去於是魏信陵君矯奪晉鄙兵至楚王亦遣春申君將兵救趙並㑹邯鄲解圍秦軍大敗秦王謂應侯曰果為白起笑遂克武安君子大在遷於隂密白起病不能行而諸侯之兵攻秦急秦乃遣君使白起出留咸陽起西出咸陽十里至杜郵館應侯乃譛曰白起之遷其意怏怏不伏有餘言願王察之王遂賜起劒令自刎起遂將劒自刎秦人憶之多怨於范睢也此謂武安君功成名立不能退身至杜郵之禍也柯亭一宿柯亭月滿天笛亡人殁事空傳中郎在丗無甄別爭得名垂尓許年漢書云蔡雍小字伯皆宿於柯亭見竹一根有節或似龍鳯之交乃曰此好用作笛吹之果有龍鳯之音矣此竹不是雍之所别誰能别之中郎謂雍折為漢中郎將也夫笛者聲調邪穢韻納邪音雖金石與絲莫可借也綿山親在邀君召不來亂山重疊使空回如何堅執尤人意甘向岩前作死灰春秋云昔晉獻公有用後妻孋姐之言煞太子申生而復欲誅公子取年十七乃出奔有士五人從乃趙襄孤毛孤侵各子介子推等五人皆國士也隨公子重耳奔經歷諸侯二十三年後獻公死惠公立惠公死德公立德公無道秦穆公乃遣兵送重耳㱕晉乃煞德公而自立是謂文公立定而趙襄等從公在外危難歷險而多論功以子推一人不言功亦不言祿而亦未及推推乃曰獻公之子九人皆死惟文公一人獨存而命晉祚未絶也非文公誰彼二三子貪天之功以為巳力我實耻之乃入綿山隱身不出文公頻召不得乃放火燒山恐子推令出子推乃抱樹而死之文公乃封綿山為介子推今寒食斷火三日為子推者也葛陂長房回到葛陂中人已登真竹化龍莫道神仙難積學嵆生自是不遭逢史記云費長房仙人也行至葛陂之地乃投杖於水杖化為龍長房乘而登仙矣又神仙傳云費長房在市見壷公賣藥不二價常懸一折空壷於樹上見跳入壷中人莫測之惟長房於樓上見之知是非常之人也乃曰掃除公座進餌受之不謝如此積久公知長房篤信語曰日暮無人時便來長房如期便往公語房曰見我跳入長房承其言誠跳即入壷矣乃見有樓五色重門左右待者折數十人公曰我是仙人忝為天豐職而公多事統後見房不學仙道與一竿竹遣長房乘之得㱕到家後投竹於葛陂中乃化為龍者矣鄧城鄧侯城壘漢江干自為深根百丗安不用三甥謀楚計臨危方覺噬臍難史記云昔鄧侯據鄧城其臣三甥謀曰君今地居楚之上流方用而可舉兵伐之不然必來攻劉侯不用其計後果𬒳楚王將兵伐鄧而滅之悔不用三生之計也驌驦行行西至一荒陂因笑唐公不見機莫惜驌驦輸令尹漢東宫闕早時㱕楚國有驌霜二馬左傳曰唐成公之馬融曰馬名鴈似之也楚子常欲之唐公不與三年止之不得㱕國子常即余尹子折從者自竊馬與之唐成公乃得㱕國竊馬者謝之唐成公曰寡人之過彼物纍身何愚至甚者也柏舉野田極目草茫茫吳楚交兵此路傍誰料五貟入郢後大開陵寢撻平王春秋云昔楚平王無道而趙相伍奢諌而𬒳誅并子尚惟少子貟逃於吳後為吳相乃將兵伐楚楚平王巳死昭王將兵戰子胥於此楚昭王軍敗伍子胥乃其郢圍昭王而開平王墓出平王尸骸磓碎以報父兄之讎也後秦軍救楚子胥遂退也緱山緱山岡翠孕仙靈古柏新松滿洞馨借問吹笙王子晉定從何處上冥史記曰昔周靈王太子名晋有非常之相好吹笙後遊緱山夜玩月吹笙作鳯皇音鳯至王乃乘鳳升仙山在洛陽塗山大禹塗山御座開諸侯玉帛走如雷扶風謾有專軍骨何事兹晨最後來昔夏禹帝娶塗山氏女為后乃與諸侯㑹折於此燕樂唯有扶風氏待強而其最後至帝乃呵而煞之使傳負以長戈斷其國也後魯公修造而掘得人脛骨一股車載之而問孔子孔子曰此乃扶風氏脛骨也音扶風氏身長五丈持諸侯㑹於此折山朝禹帝帝怪其後至而煞之於此今餘骨在也豫州䇿馬行行到豫州祖生寂寞水空流當時更有三年壽石勒尋為闕下囚晋史云祖逖者晋豫州刺史遇胡羯亂於中原祖逖有當代之才在豫州治兵計方戰於石勒勒頻敗兵因勢窮逃竄無路而或有妖星現於分野逖夜觀之乃嘆曰天下欲使我守賊也而妖星現吾分野天若更與我三年壽我當生擒石勒也是歲逖死石勒復盛而稱帝號後趙矣故燕公張折說才命諭云當其時也天下與華夏兮何咎與戎羯兮何親此之謂也博浪沙羸正鯨吞六合秋削平天下虜諸侯山東不是無公子何張良獨報讎漢書曰張良家住韓國代代折為韓相也秦始皇滅國而韓國亦滅良時年十九為國報讎欲謀煞秦皇良散家財結天坳壯士募得三百餘人皆折豪俠之士於博浪山候始皇東遊於此山下過良乃與壯仕在山上墜石打始皇車不中而中副始皇怒使兵搜獲壯士而煞之張良乃逃走避難後遇黃石公折授良兵法而佐漢王滅秦也當時山東六國公子不少而無報讎之心唯良獨為韓國者也隴西乘春來到隴山西隗氏城荒碧草齊好笑王元不量力函關那受一丸泥後漢書曰時隴西太守隗囂折據隴西稱天子及光武帝定天下而囂欲降其日有謀臣王元乃說囂曰可以將一丸泥東封函開此乃万代一時也奈何欲降囂納王元之言遂不㱕光武光武乃使吳漢將兵伐之破而遂滅隗氏乃絶矣乃取隴西路伐公孫述乃滅天下遂㱕光武定矣夫智小而言大者愚也言弱而志強者賢也故君子不言言必有中苟言而似戲矣白帝城蜀江一帶向東傾江上巍峩白帝城自古山河㱕聖主子楊虛共漢家爭後漢書曰王莽時蜀郡太守折公孫述字子楊乃武帝龍興述在蜀稱天子初有善相者謂述曰君若據蜀尽十二年矣其妻問述述曰只十二年妻曰朝聞道夕死可矣况十二年乎述納其言舉號稱白帝乃遣王滿田戎將兵守據荆門築城守界號曰白帝折城今在破口夔州也光武遣吳漢將兵從隴山路入蜀又使岑彭將水軍從江陵上伐之岑彭大破田戎等於荆門煞之吳漢破公孫述於新津天下遂定子楊乃公孫述也聖生謂光武帝也謂公孫述虛共光武皇帝爭戰也灞岸長安城外白雲秋蕭索悲風灞水流因想漢朝離亂曰仲宣從此向荆州魏史云王粲字仲宣長安人也有大才學後漢末中原大亂粲乃於灞水江岸嘆息遂乃南行至荆州投江南太守劉表於表門下為上賔粲在江南與表登樓宴樂乃作登樓賦思憶長安也巳濮水青春行役思悠悠一曲汀蒲􅗛水流正見塗中龜曵尾令人特地感莊周莊周賢釣於此水楚大夫上人徴之願以境內貴之莊周但以持竿而釣略不願焉楚大夫又堅而徴之莊周曰吾聞楚有神龜死巳三年王將龜骨衣巾箱中常折處庿堂之上其龜寧死留骨處貴寧生曵尾塗中耳楚大夫曰寧生曵尾塗中也莊周曰吾今曵尾塗中也故逺寵辱之憂保全生之志實為賢哉魯城魯公城闕巳丘墟荒草無由認玉除因笑臧孫才智少東門鍾鼓祀鶢鶋左傳曰臧孫有三不智作慮蕭折縱逆祀之鶢鶋鶢鶋海中大鳥也伐鍾鳴鼓而祀之孔子謂之不智君臣門弱國乃丘墟卒致季氏之亂房陵趙王一旦到房陵國破家亡百恨增魂斷叢臺㱕不得夜來明月為誰升後語云趙王遷𬒳秦始皇使折王剪將兵伐趙滅其國虜趙王遷於房陵囚也王𬒳囚每見月夜乃悲恐思憶本國也初秦兵伐趙趙王使廉頗拒之趙王折有寵臣郭開與頗有隙乃譛之王使樂乘代之頗恐奔魏後樂乘敗王乃使李牧將兵拒秦秦兵頻敗秦乃隂使人多與趙王寵臣郭開金帛令改將開乃譛云李牧欲反乃使趙䓗顔聚伐之牧不受譛王乃使巳斬牧秦始皇大發兵使王剪將兵伐趙大破䓗等入邯鄲虜趙王㱕秦囚將房陵矣趙氏遂絶矣牛渚溫嶠南㱕輟棹晨燬牛犀渚照通津誰知万丈洪流下更有朱衣躍馬人東晋史云成帝時蘇峻反攻破都城折時武昌太守溫嶠學兵勤王討蘇峻等賊㱕鎮武昌至牛渚灘治船水底常似有音樂之聲嶠乃以治水犀角照而看之其水深千万丈明見底下有人騎馬來去或朱或紫也至夜嶠夢見有人謂嶠曰幽冥有殊君何意相照也甚惡之嶠舊有齒痛是如齒痛而卒廢丘山此水雖非禹鑿開廢丘山下重縈回莫言只解東流去曽使章邯自殺來漢史云項王兵入秦秦遣章邯將兵二十万拒項王於此山下隔水而陳項王夜潜渡江烈陳而進那不意項王軍渡遂以二十万人倒戈而降後項王疑秦不降乃詐而坑之而不殺章邯邯之乃自殺矣朝歌長嗟墨翟少風流急管繁絃似冦讎若解聞韶知肉味朝歌欲到肯回頭史記云墨翟不好音樂常懷悲怨為少孤也行至朝歌縣翟問左右曰此是何處也左右曰前至朝歌城也翟乃回車以其地名朝歌而不好樂也孔聖自大返有三月不知肉味為聞詔戶之意重舜之王文也夫樂者正乎政治計𬒳國風非怡情淫泆之宗也谷口一旦天真逐水流虎爭龍戰為諸侯子真獨有煙霞趣谷口耕鋤到白頭漢朝之子真隱於此至老也夫隱逸者消聲煙水沌跡鋤耕雖無憂相之名自取夫車之至也武陵溪一溪春水徹雲根流出桃花片片新若道長生是虛語洞中爭得有秦人史記云武陵溪水從桃源洞而流出在朗州也秦始皇時滅六國平天下勞役万姓北築万里長城民怨多逃避入山或有逃人入此洞洞中多有桃樹無五榖逃人乃喫桃或因此得道今傳桃源洞有仙謂秦人避秦亂得道今在也今武陵溪在朗州屬荆南也流沙七雄戈㦸亂如麻四海無人得坐家老氏却思天竺住便將徐甲去流沙七雄者後語云秦趙韓魏燕齊七國並稱王各舉兵甲相持天下茫茫老子云中原兵革整亂惟思天竺可居乃遂與徐甲遊天竺國至流沙不知所在矣左氏謂老子道人也徐甲弟子也大澤白蛇初斷路人通漢祖龍泉血刃紅不是咸陽將瓦解素靈那哭月明中漢書云髙祖布衣時􅎔欲龍興之際當秦末喪亂之始有一大白蛇於大澤當路行人不得過有人告於髙祖髙祖乃提劒往而看之乃聳身縱毒髙祖乃舉如揮劒而斬之其夜有素衣婦人於蛇死處哭之髙祖問何故哭之婦人曰吾子是白龍也故秦氏欲滅其龍先現乃𬒳髙祖斬之音秦號金天氏乃金德王屬西方之位乃帝也漢髙祖乃火德王火屬南方之位乃赤帝也白蛇死後秦遂滅於咸陽也素衣謂白衣婦人也夜哭於蛇也傅岩岩前板築不求神方寸那希據要津自是武丁安寢夜一宵宫裏夢賢人史記云殷湯武帝夜子孫𬒳逆折臣作亂帝道哀徴至武丁帝夜夢天賜與賢人於傅巖板築求此人乃見一人姓傅名說形貌似夜夢中天賜者賢人乃載於車中而㱕以為上相說乃致治天下大定帝業復盛殷乃重興武丁曰和羮用汝為鹽梅大川用汝為舟楫元旱用汝為霖雨乃傅說之賢治也故千文云說感武丁謂傅說未逹感帝夢見也夫用賢者不問微賤然取艮能祗於吕望興周百里霸道皆因一箇以至窮隆也澠池日照荒城芳草新相如曽此挫強秦能令百二山河主便作樽前擊缶人後語云秦昭王強盛乃遣使命趙惠折王開㑹宴於趙王祗欲不赴又恐違秦王之命祗欲赴又恐秦王虜入咸陽城乃與羣臣論之藺相如亷頗皆勸王令赴趙王乃令藺相如為將將兵從王赴秦國頗與羣臣送王至河臨别頗秦曰王赴秦往返祗可三十日如三十日不㱕臣請立太子為王以絶秦望王許之便行至㑹燕樂秦王曰寡人聞趙王善琴請鼓之趙王乃為秦王鼓琴送酒秦御史乃書之相如耻之乃前曰趙王善鼓琴請秦王擊缶秦王怒不許是日相如缶進秦王王不肯擊相如乃按劒曰五步之內請秦王辱相如請以頷血濺大王矣折秦王左右欲殺相如相如張目叱之左右皆退秦王懼乃為擊缶相如乃召趙御史亦書記某月曰秦王為趙王擊缶秦羣臣日請以趙十五城為秦王壽相如曰亦請以咸陽為趙王壽秦終不能勝於趙趙立㦸投兵待秦秦亦不敢動既趙㱕遂趙王以相如勳大拜為折上卿似此謂相如能為挫秦昭王為趙王擊缶也峴山曉曰登臨感晉臣古碑零落峴山春松間殘露頻頻滴酷似當初墮淚人晋書羊祜字叔子位至三公後卒是日聞祜喪者號慟相撓民皆罷市襄陽百姓常於峴山乃祜生平遊憩之地祜樂山水每風景必造其山後民追念於彼建庿立碑歲時祀焉杜預名曰墮淚碑民避其諱稱門戶為門屋改戶曹為辝曹其遺愛有如此者四皓四皓忘機飲碧松石岩雲電隱髙蹤不知俱出龍樓後多在啇山第幾重前漢書髙祖欲廢太子立戚夫折人之子趙王吕后曰留侯張良善劃計合召良至上曰今易太子君不可安枕髙卧也良曰臣難以口舌折爭也有能致四人在商山即東園公綺里季夏黃公角里先生謂之四皓今令太子里書原札迎之乃至士果見四人從太子眉髮皓曰衣冠甚偉上怪問曰各奏名姓上曰吾求公等不至今從太子何也陛下䡖士臣等義不愛辱故隱今太子仁敬天下莫不延頸而望上曰煩公調護太子遂出上目送之召戚夫人指示曰吾欲易太子四人為輔羽翼巳成欲難動也戚夫人流涕帝為作楚歌其辝道震不能尽録不易太子者四皓之力也滎陽漢祖東征屈未伸滎陽失律紀生焚當時天下方龍戰誰為將軍作誄文漢書云髙祖與項王戰敗乃是投滎折陽城𬒳項王圍晝夜急攻之時髙祖糧尽奔走無路計窮欲降紀信曰臣形躰類王今信乘車夜出降楚必信之而抽軍既東信出降而圍解王可突走㱕漢矣王納其言立令紀信出降楚王纍解圍祖乃奔走㱕漢㱕於王矣信遂死矣今即用是此言胡曽詠史詩此宋板詠史詩卷數與文獻通考合與四庫提要異昔年從文瀾閣鈔得一夲不分卷詩之次序及注皆與此不同蓋别行之本故卷首無序亦不載注者名氏知此夲甚祕可寶已胡珽
