front:
  text: 胡曽詠史詩卷第三五十首磨笄山官渡虞坂秦庭延平津金義嶺瑶池啇郊銅柱關西畨禺咸陽髙陽池瀘水云亭細栁營葉縣射熊館頴川八公山夾谷杜郵柯亭綿山葛陂鄧城驌驦陂柏舉緱山塗山䂊州博浪沙隴西白帝城灞岸濮水魯城房陵牛渚廢丘山朝歌谷口武陵溪流沙大澤傅巖澠池峴山四皓滎陽磨笄山春草綿綿岱曰低山邊立馬歎磨笄黃鶯也似追前事來向夫人死處啼春秋云昔趙侯其子襄子伐岱侯侯戰襄子於岱山之下岱侯𬒳襄子煞之岱侯妻乃趙侯之女也聞夫𬒳擒乃將兵往救之至此山聞夫巳死乃下馬於頭上抽笄磨而自刺死趙雖併國矣今之岱州鴈門郡是也夫見危致命視死無難緬惟琴瑟之情不異椿松之節此實謂大夫之女也官渡夲初屈指定中華官渡相持勒虎牙若使許悠財用足山河爭得屬曹家魏志云兾州袁紹字夲𥘉兵強而欲啚天下曹公拒之官渡兵強糧壯曹公兵弱糧少曹公患之紹下臣許悠多計貪財而好色不治紹留逢紀佐其子知留後而許悠犯法逢紀收許悠家産悠奔曹公公聞許悠至乃倒屣絶食而迎之撫其背子來吾事讎矣曹公乃用許悠之計絶袁紹後軍輜重紹軍大敗紹乃憤恨而死天下遂㱕曹氏皆悠計也
