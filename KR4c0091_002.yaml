front:
  text: 胡曽詠史詩卷第二五十首成都濡須塢檀溪青冢李陵臺河梁軹道上蔡漢宫豫讓橋漢中華亭彭澤武昌鴻溝東山涿鹿雲夢孟津七里灘霸陵殺子谷馬陵嶓冢玉門關昆陵長安淲沱河望夫石黃河東門鳯皇臺回中五丈原泣水褒城平城汴水金陵昆明池蘭臺宫金牛驛望思臺邯鄆箕山洛陽髙陽㑹稽山邵陵不周山成都杜宇曽為蜀帝王化禽飛去舊城荒年年來叫桃花月似向春風訴國亡昔蜀王姓杜名宇按蜀王羽化為鳥今杜䳌鳥是也
  hash: sha256:f39b48ab9ca8a5cd5e4edf933c24ce8b8dfdf86569cb7c8cb15188c05b152042
