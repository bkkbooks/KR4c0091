body:
  text: 細腰宫楚王辛苦戰無功國破城荒霸業空唯有春花上露至今猶泣細腰宫史記曰楚莊工負蒭好細腰美人王左右并闔囯美人皆為之約食乃起宫常与美人宴此宫不治囯政秦始皇遣將王剪將兵伐之剪九解楚將項燕擄王入秦楚遂滅也長城案十道圖今在臨兆折縣也初起築在城東二十里祖舜宗堯自太平秦皇何事苦蒼生堯舜有天下也土堦不髙三尺采椽不苑茨不剪而天下㱕伏故述始皇无端勞役蒼生蒼生酷怨也不知禍起簫牆内虚築防胡萬里城春秋後語云秦始皇滅六囯後天下一統有童子云亡秦者胡也乃遣太子扶蘇將軍蒙恬領兵役万始築万里長城以防胡胡乃畨也後始皇崩丞相李斯乃折立少子胡亥為二丗皇帝用佞臣趙髙讒殺李斯不修囯政天下乃乱秦遂滅沙苑馮翊南邊宿霧開行人一歩一徘徊誰知此地凋殘栁盡是髙懽敗後栽北史云魏侯信都太折守髙驩驩制朝廷魏帝避驩入関驩將兵追帝至沙苑長安太守宇文泰出兵迎帝於長安与驩戦大敗失馬乃騎駱駞㱕信都乃立清河王子為魏帝遂二分驩為相封神武將軍驩子洋滅魏自立号北齊追驩為神武皇帝宇文泰㓕西魏於長安自稱周文帝其時西号永熈元年東号天平元年皆尽㓕矣宇文泰乃於戰勝之地人各種栁一株以旌武功人皆号為武林者也論云永熈西道嘆河川之亦㱕天平此移落業西之俱巳可謂悲矣鉅橋積粟成塵竟不開殷紂於此起倉聚粮年乆多変成塵也誰知拒諌剖賢才史記云紂之妃妲巳乃妖精惑於紂作酒池肉林使男女躶形飲酒醉相逐紂兄比干進諌妲巳云賢人心有九竅竅而九毛可剖而觀之如其言妲巳大笑紂巳言定益而信之時兄二人皆賢懼剖所以微子去紂而奔箕子佯在截髪為紂之奴群臣无復敢諌也武王兵起無人敵遂作商郊一聚灰史記云帝紂名章又名受智足以拒諫曰足以飾非倒拽九牛暴搏猛獸幸惑於妲巳造瓊室鹿臺飾以羙玉大宫百里中有九市一百二十日為就晝夜与崇侯費仲戲焉又置炮烙之刑又刳剔孕婦積粟糗粮不思民弊是時六月雨雪又雨血又雨石鬼哭山鳴乃周武王聞紂兄三人皆去乃以太公為將起兵伐紂囚於商郊而後殺之殷遂滅矣論曰紂王非布衣草創之折君撥乱主時之宇盖是太平折業所置膏腴外无師傅之嚴内乏自然之智罔知稼穡不㑹艱難為主之道不計賢愚近善即折染情近惡即感意胡不博識者乎沙丘年年遊覧不曽停天下山川欲遍經堪笑沙丘纔過處鑾輿風起鮑魚腥史曰秦始皇三十折六年頻有乖祥於是十之兆得遊從耶吉遂西游江上㑹稽望平南海至北琅耶是時始皇至平原津病而惡其疾甚乃將璽書賜長子扶蘇求㑹咸陽而葬付璽書於趙髙未授於扶蘇始皇便崩趙髙不欲令他人知恐天下變未發䘮百官奏事上食如常故棺載輼輬車時暑至沙丘東臭乃詔從官載鮑魚一石以混其氣夫豈不惜位於旬時不生付扶蘇趙髙之詐謀故頽於宗社者哉石城古郢雲開白雪樓漢江還遶石城流何人知道寥天月曽向朱門送莫愁晉書石城有女名莫愁善歌舞洞庭五月扁舟過洞庭魚龍吹浪水雲腥軒轅黄帝今何在廻首巴山蘆葉靑古史云軒轅遊蜀見蜀中多水決之䟽下江湖皆溢乃鑿五湖貯水今洞庭䓁是也又於洞庭鑄鼎鼎成黄帝上昇群臣折攀龍髯而号勤遺劒履而去遂葬劒履於巴山丘也皇帝莫不䟽恤万民感伏天下致屈軼生瑶騏驎巢園万代楚國城池颯巳空陽臺雲雨去無蹤何人更有襄王夢寂寂巫山十二重史記云楚襄王夢与巫山神女㑹陽臺乃神女庿号者也赤璧烈火西焚魏帝旗周郎開國虎爭時交兵不假揮長劒巳挫英雄百萬師吴志云魏帝者曹公名操也周郎乃吴將周瑜也後漢末曹公為丞相南征劉表卒少主劉琮乃使程昱送欵降曹公乃治劉表荆南水軍八十万飛雲戦舩五千隻集欲東征孫權權乃遣將軍周瑜將水軍三万人逆公於赤壁漢軍敗吳小將黄蓋說周瑜曰冦衆我寡難与持乆冝急破之今彼岸有大戦舡岸有百万軍營又北軍不習水土多病將軍且將五千隻舡舡中多以乾葦脂膏灌之每隻大舡繫十隻小舩君自領三千餘人告云欲降略而自放火燒舩將乗小舩其時東風吹舩燒岸下戰舩并悉燒軍營相次渡兵攻之所以大破果如其詐曹公遂大敗北㱕不復圗吴矣其江岸亦名赤壁近江陵也居延單于之界蘇武放牧之地漠漠平沙際碧天問人云此是居延停驂一顧猶䰟斷蘇武爭禁十九年漢書曰使蘇武入匈奴界到彼堅執漢莭不拜單于乃留滯十九年以全大莭後得㱕帝乃以武為典属囯令之鴻臚卿是也莫不事明史策名煥古今若或苟且身名豈可志堅大莭也吴宫草長黄池千里餘㱕来宗廟巳丘墟出師不聽忠臣諌徒耻窮泉見子胥史記曰昔吴王名夫差時兵強云我是周天子太伯之後今合為諸侯之長乃与晋侯㑹兵於黄池投盟伐齊取石田伍子胥諌曰三月破越不滅折之越王任賢相范蠡君臣同心乃是王心腹之疾也今齊乃是王之手足之疾也願王捨齊而治心腹之疾王不聽折乃賜子胥死子胥乃謂使者曰吾死後其取吾眼置吴囯東門懸之以觀越兵入吴矣明年春吴王遂舉兵至黄池未返越興兵伐吴折破城燒吴宫庿擄吴太子諸王妃王還越矣吴王乃罷兵㱕吴吴囯巳破臨死謂左右曰我不用子胥之言今囯滅我泉下羞見子胥我死可作靣衣横掩靣至今傳曰夫差以弃忠臣而取佞豈不嗟乎恃威力而自亡至道窮也阿房宫音旁史曰秦始皇三十五年越宫在阿之旁未有其名故時人謂之阿房宫呼之新建阿房壁未乾沛公兵巳入長安帝王苦竭生人力大業沙崩固不難春秋後語云阿房宫東西五百歩南北五十丈上可以坐万人下可以立五丈旌旗也修營未竟崩於沙丘漢王興兵入折長安也秦遂滅也故書云恃德者昌恃力者亡始皇恃力霸道傾䧟也沛中漢髙祖所居鄉井在沛中豊邑漢髙辛苦事干戈帝業興隆俊傑多猶恨四方無壯士還郷悲唱大風歌漢書云髙祖初爲泗上亭長折常居芒碭山每有紫雲為蓋後起軍入長安感五星聚於東井按文選有漢髙祖功臣頌列輔佐共平天下者三十一人陸士乃所潠後天下定因思郷乃還郷制大風歌詞顯於史漢髙皇帝盖以選賢任能好生惡殺施帝王之道示秦人之恩也帝王論中云漢髙興之有五德一曰堯之苗裔二曰躰皃多竒三曰神武有徴四曰寛明仁恕五曰知乆善如之不用人如田巳從諫如水之順流然尚有深幾亡社稷有大臣父賛免遭女子啚謀帝崩劉章周勃陳平立代王金谷園一自佳人墜玉樓繁華東逐洛河流唯餘金谷園中樹殘日蟬聲送客愁晋史云石崇字季倫仕晋官至太保素有文才備在文選家富敵囯在洛陽都郭号金谷園每有豪貴者結二十四反燕樂於此有美妾名緑珠能歌舞声音遶梁今凡号曰遶梁之声也後惠帝昏聞賈皇后嬌殺太尉并楊太后又誅太傅衛雍奔越王倫怨望㪯兵廢賈皇后權制朝庭用吏人孫秀爲太尉秀乃遣使於石崇家取緑珠崇曰緑珠乃吾爱妾遂不与秀秀乃謂趙王倫曰石崇家大富可殺之取財帛將用贍軍折遣兵士取崇崇在樓上謂緑珠曰吾今謂汝死緑珠乃与崇飲樂而别云妾當去樓下而死終不能事孫秀也崇乃𬒳秀誅之矣夫美何殞身苟德則留重士之之名佳人弃命知恩别顯好色之過此者只冨其家不冨其囯也湘川虞舜南捐萬乗君靈妃揮涕竹成紋不知精魄遊何處落日瀟湘空白雲古史云舜有虞氏髙陽之後姓姚瞽叟之子父頑母囂舜少而孝堯聞聪明禅位与之天下太平故尚書云元首明哉股肱良哉庶士康哉又愽物志云帝舜南捐不反舜有二妃一曰娥皇二曰女英並帝堯之二女也於洞庭憶舜揮涕洒竹成紋投瀟湘水而死也今乃班竹是也夫舜受堯譲位日月光華郷雪於灯不二妃之泣想亦感万民之懸思也夷門在梁城之東門六龍冉冉驟朝昬魏國賢才杳不存唯有侯羸在時月來空自照夷門後語云夷門乃魏囯之郭門也今汴州東折門是也六龍者謂秦時山東趙魏燕齊韓楚䓁六囯也魏有賢人侯生名羸隱在夷門作門監魏公子信陵君名无忌是魏王弟也聞侯生賢乃往謁之与公具載逰市訪故人朱亥亥即屠者操刀於市以觀公子之德公子乃下車謁之无愧色也後秦始皇伐趙囯邯郸趙王遣使求救於魏魏王乃命將軍晋鄙將兵二十万救趙兵未發秦王乃下令曰寡人伐趙即曰破諸侯敢將兵救便移兵遵之魏王聞之驚乃勒晋鄙於頰城屯駐不敢行取武苻軍印於卧内趙圍急平原君發書曰趙囯一旦亡即君之姉亦為秦君虜將矣何不勸王令發兵救也信陵領諌王伯秦終不敢發兵信陵曰乃約東門下客百餘人間赴邯郸臨行往辝侯生生无言而遺公子行一日所巳來乃歎曰吾聞侯生賢吾常賢之吾今往趙死生无一言而遣吾乃廽車生笑曰羸知公子廽也乃謂公子曰羸聞晋鄙武苻軍印在王卧内无人得知惟王愛妃如姬姬父知云昔如姬父𬒳賊殺如姬常構十金求賊无能得之者後公子為誅其賊如姬常思報公子之德令可言於如姬令竊晋鄙武苻軍印而交兵晋鄙若遟疑即令朱亥袖四十斤金鍾擊之煞勒兵便發公子如其言並依獲矣公子勒兵臨發折侯生曰老不獲攀隨乃投輪死而公子至趙大破秦軍邯郸遂解令人將兵還魏信陵恨王不返遂留趙後十年秦伐魏信陵方返㑹諸侯之軍救魏大破秦軍後十五年秦軍不敢出関也夫侯生朱亥雖有鄙人名懷竒氣苟非留恩四治養士三千豈於窮廹之間付以安危之計也田横墓古墓崔嵬約路歧歌傳薤露到今時也知不去朝黄屋秖爲曽烹酈食音異其音機者漢王𥘉定大下諸侯各稱王齊有田横稱齊王漢王遣韓信収趙未伐齊漢王使􅐱生說斉令降漢横乃罷兵降漢􅐱生在齊未還李左車說韓信曰將軍興兵百万半年方収趙五十城今􅐱生軍呈言舌下主七十城功不如􅐱生也且漢王曽有詔令將軍折伐齊今齊雖降王未詔士令伐斉有紹使任彼心不設備宜㪯兵伐之但執前詔信納其言乃發兵横怒謂􅐱生曰漢王汝存慰於吾而今韓信求汝若為可止韓信之汝若不止當烹之􅐱生曰信執漢王前詔亦登城觀之乃曰韓信計巳成之乃就烹而死後天下定諸侯皆折朝田横懼誅引徒属五百餘人入海島中漢帝以斉囯向來賢皆附之信詔横横与二客洛陽三十里謂人曰吾曽烹􅐱生帝雖不罪我乃不愧心今帝在洛陽請斬吾頭馳往三十里形容未改与生見不别遂自刎今二客奉頭進髙祖帝嗟曰有似也夫有兄弟三人更王齊中豈不賢哉田横田榮田横三人乃与二千人以王葬之其二客穿其塚傍作孔皆自刎而入義上感而不敢哭乃作薤露歌詞寄其哀情今挽歌是也夫愛人重義可謂賢哉雖身謝也中實名光簡日者巳鴻門項籍鷹揚六合晨鴻門開宴賀亡秦樽前若取謀臣計豈作隂陵失路人史曰楚漢巳滅秦祚項羽遂於鴻門致宴欲有約項荘欲舞劒擊煞髙祖漢相張良素与羽叔項伯乃見良具言羽意良因引見髙祖髙祖知意乃得項伯亦起舞劒以身蔽髙祖羽意乃定此張良之力也項羽雖負㧞山之力常饒虎齒之心有賢臣范曽不能用後垓下大敗單馬走㱕江東至隂山失路乃嘆曰憶鴻門㑹不用范曽言誰知今日獨歩如在荒山言訖大路豁開遂至烏江漢王乃鍳識之心執寛弘之志蕭折何運籌策於幃幄之内韓信言曰百万戦必取功漢王能以恩信用之也夫書云得賢者昌失賢者亡也黄金臺北乗羸馬到燕然此地何人復礼賢欲問昭王無處所黄金臺上草連天後語云昔燕噲王𬒳斉大王所殺燕昭王次立乃謂大臣曰安得賢士与同大以報先王之郭隗曰王能築臺於碣石山前尊隗為玄王即天下賢士以王好賢必自至也王如其言作此臺多以金玉崇之号黄金臺巳尊隗為賢隗賢不賢以招天下賢士也樂毅聞之自雒而往邹衍自斉而往劇辛自趙而往天下賢士並湊於燕王乃以樂毅為將伐斉六旬之内大破七十城殺閔王於陣上齊太子与田單東走即墨矣是為得賢而能在之委士而无猜之上下相於无不利也夷陵在陜州劉伯莊内楚囯芫君之大也夷陵城闕倚朝雲戰敗秦師縦火焚何事三千珠履客不能西禦武安君武安君秦將白起也楚囯折列王不修囯政秦昭王乃交白起將兵伐楚楚王大敗了乃有兵大破夷陵焚之宫殿楚王東奔陳令使入秦折請割南山之地秦兵遂退楚相黄歇号春申君門下養三千客无計拒白起也夫春申徒彰之名計寡重言之志於云冨貴必昧鍳知不聆迸耳之言多采徇瘠之說一朝失之四頋无人疾雷无掩耳之方囯士有攅眉之歎也漢江漢江一帶碧流長兩岸春風起緑楊借問膠舩何處没欲停欄棹祀昭王春秋云昔周昭王道䘮楚人不朝敬王自去征済於漢江舩人惡之乃作舩以膠粘合進王王乗舩至中流膠之沉水而崩也故曰道在即昌道䘮即亡運去而禍来事之常大非積仁累聖澤及四方侯伯同盟匡臣竭節下可堅固蒼梧有虞龍駕不西還空委簫韶洞壑間無計得知陵寢處愁雲長滿九疑山史記曰舜帝葬於此山其山有九峯常折有愁雲浮罩莫辨陵之所在呼為九疑山也舜昇天下也弹五絃琴之治詠南風之詩聖德穹隆惠和夐絶陵寢之所故与凡殊也陳宫陳國機權未可涯如何後主恣嬌奢不知即入宫前井猶自聽吹玉樹花南史云後主名叔宝常躭内寵不治囯政伯隨開皇九年隋文帝遣髙頻䓁將兵南代後主乃令蕭磨訶任蛮奴䓁拒之戦於蔣山之下陳軍大敗後主猶酔於後庭玉樹花侍臣奏云隋軍至君欲何計後主云我當入井避之及髙頻䓁兵至金陵不獲後主云下先鋒將折韓擒虎乃登樓望見一婦人戴盤入後園隋將乃云此必是陳主在彼乃令捜獲之果有一大井後主在中隋人呼之不出即欲投石後主乃叫隋人遂欠䋲引之乃曰何太重乎乃出有三人同來一處後主及張䴡華趙貴人皆後主愛妃也陳折遂滅也常覧帝王略論陳祖永定元年折將受梁帝禪位史傳得夢有一人着朱衣武冠自天而下手執金牌上有文曰陳氏五主三十四年驚斍与孔宗範說曰此夢善若驗吾子孫當憂也自武帝至後主果五主從永定之初及至之去年共計三十四年此寶神驗陳末之時史傳尚載者也南陽丗亂英雄百戰餘孔明方此樂耕鋤蜀王不自垂三顧爭得先生出舊廬蜀志云諸葛亮字孔明漢末天下䘮乱孔明南陽不仕閑居今鄧州也乃先主劉備寄寓於劉表時有徐庶先生此有諸葛亮字孔明号卧龍折先生此人先主可就不可屈先主乃三度自頋孔明於苑廬之間咨以當代之事孔明起從先主封武侯後將兵南征北討秦中皆云臣昔樂居南陽而先主三頋臣於茒廬故南征北伐不憚勞苦恐負先主之盟也文選名臣賛曰沉魚釋水髙鳥候柯也雖藴機籌猶湏際遇孟子曰有時无道時即歎嗟賈誼曰有時无君即嗟蓋孔明出於遇時而更得聖主也巳即墨蔡州有即墨之縣也即墨門開縱火牛燕師營裏血波流固存不得田單術齊國㝷城一土丘後語云昔燕噲毅將兵伐斉斉王折湣折王所殺燕昭王次立遣樂大兵掠之𬒳樂毅破之王崩毅得勝阱陷斉七十城唯莒与王曰即墨两城未拔斉公子田單乃折保護太子守於即墨立為王燕將樂毅以單賢不敢攻即墨且收斉七十城尽折輸於燕後昭王死太子立謚為惠王惠王信讒乃疑樂毅猶折未伐之田單令人作貨於燕讃之斉不怕樂毅毅雖収七十城而數年不敢圍即墨人云我即畏騎刼惠王乃令騎刼將兵代毅毅遂奔趋矣騎刼至縱兵攻即墨軍且不出戰令人謂騎刼曰我斉人惟怕燕人投而割耳鼻我不忍當降騎刼信之斉人益固不敢出之又曰折我人懼燕先入墳墓出骸骨鎚之我不忍當降騎刼不信之斉人益怒老少皆出戦乃令人告云欲降啚其不備乃㨂牛五千折頭束刀於角五綵纏身繫葦於尾以火燒之夜穿城四面繫鼓威牛牛奔而出於後大破燕君斬騎刼併復七十城乃折田單之功也固存者斉王字也田單者斉王之兄弟故曰公子封為安平君夫田單同処危中見機而作旣就所見之略乃成千載之名也渭濵岸草靑靑渭水流子牙曽此獨垂鈎當時未入非熊兆幾向斜陽嘆白頭史曰姜子牙即吕望也隱迹於渭濵垂鈎周文王因夜夢見獵得一熊王出果於渭濵遇逢文王子牙以車載而同㱕折拜為太公後用謀伐折殷也帝王略論曰吕望王佐之竒才師曠之資之德明也余觀說命之書一千年一聖人出五百年一賢人生若夫有賢聖所生即有命丗之才其折姜子牙實謂命丗之才矣孔聖巳後生可畏焉知來者不如今又曰一衬年如日出之光壯年如日中之光暮年如日入之光天命之年矣吕望八十方遇文王莫不色衰力敗心怠神疲縱令食庿乗車入師出相任成大事焉能乆長若不一筮有徴豈不折百年虚度雖胤後人成爲巳有也五湖東上髙山望五湖雲濤煙浪起天隅不知范蠡乗舟後更有功臣継踵無史記曰昔越王句踐与吴王夫差戦吴用伍子胥為將大破越軍圍越王於㑹稽山越王用范蠡言得免後子胥死越王用范蠡為將而復滅吴吴滅後范蠡功成乃曰越王句踐烏啄烏頸斯人也可与同危不可同樂也吾今功成名立不退伏必遭刑戮遂言於王請退相位逰泛五湖斈道乃隱五湖不知生死矣乃功名万代傳矣以吴為陶公也自蠡泛五湖後更无功臣如范蠡之見機也故陸士衡豪士賦序云禍積起於寵感而不知也辝寵而招其福范蠡若非竒人寜知斯道也易水一旦秦皇馬角生燕丹㱕此送荆卿行人欲識無窮恨聽取東流易水聲後語云昔燕太子名丹入質於秦折秦皇不礼太子怨後燕王病太子請㱕侍養秦王不聽乃謂曰馬生角乃放子還太子志感馬生角秦王乃放太子還燕太子由是折怨秦王謀欲挾客之謂壯士田光光曰聞騏驥少壯曰行千里乃其老矣駑馬先之光今年老慮不済事衞人荆軻志勇願為太子結之太子乃贈千金詔軻軻喜而行光謂軻曰願速執太子嘱勿泄光致死以不泄乃枳輪而死軻至燕燕太子甚敬重之乃言人秦之事軻云欲要燕地啚進之又要秦將樊於期首進太子曰地啚可於期首不可但於期事窮投寡人寡人不忍殺之軻乃私謂於期曰將軍得罪於秦人家族尽𬒳秦誅滅今秦搆千金邑万戸求將軍頭今願得將軍首并燕地啚而進秦王秦王必喜軻得近而刺殺之以報將折軍之讎荅燕太子耻於期乃自刎太子聞之奔往乃見於期巳死矣太子乃伏屍而哭悲不勝折忍遂乃以凾盛之詔士十人以秦武陽為使太子与賔餞送至易水之上置酒大宴髙漸離擊筑宗意知為壯之声感悲歌衆皆涕泣或慷愷髮上衝冠文選云荆軻擊劒而歌曰風蕭蕭兮易水寒壯士一去兮不復還士皆淚荆軻至秦乃進地圖王乃以御掌接之武陽捧於期首盛戦懼不敢進軻乃復取進之秦王又以御掌接之軻乃擒秦王䄂秦王大驚軻謂曰欲作秦地之鬼欲作燕囯之囚秦王懼死荅之願為燕囯囚軻乃不煞秦王謂軻曰請与别後宫軻許遂置酒与軻飲秦宫女乃鼔琴送酒琴曲中歌云軻酔教王掣御䄂越屏走軻不㑹琴音而秦王㑹之遂掣䄂而走軻以七首擊之不中中銀柱火出軻大笑秦王左右遂煞荆軻秦王大怒後兵伐燕燕王与太子東保遼東秦將李斯攻之宗意燕王乃煞太子送首於秦秦王怒不解圍遂發大軍併滅六囯矣此爲燕太子恨於秦王无窮猶如易水之声也夫勇士者懷須其智先立其功荆軻雖决烈之心臨事因循豈不勞而无功者哉長平長平瓦震武安初趙卒俄成戲鼎魚四十萬人俱下丗元戎何用讀兵書後漢語云昔秦昭王伐韓上黨韓不能救上黨太守馮髙乃遣使投趙請救之韓遂不阻隔秦軍不能救臣今民不願入秦今願以上黨城市邑十七城降趙趙王乃詔趙豹議豹諌不令受之王曰今發兵攻諸侯猶不獲尺寸之地今人以城邑十七降安可不受乎豹曰秦攻韓數年只啚上黨今不得而趙得之此謂无故之利秦禍必集於趙王勿受王問平原君上黨之地接近邯鄲折取之以益邯鄲而多秦敵秦將白起臣前後王於㑹上見之臣觀白起形相頭尖而銳視瞻下轉執而強此人難与爭鋒可与持乆令廉頗敵之趙王乃許馮髙降遣趙勝將兵救上黨因之秦軍遂退自此秦趙相攻秦令白起攻趙趙遣廉頗拒之於長平數年不下秦乃罷白起令王齓將兵与頗相守又且使人行貨於趙折賛亷頗令趙改將云秦將只畏馬眼子趙括不畏廉頗趙孝成王信之命趙括令將兵代亷頗拒秦括母見王諫王不令妾男將兵拒秦王曰何故對曰妾夫趙奢在日男括每念兵書与父論兵法其父謂妾曰此子乆後不可為將若為將必敗破軍也今王必若使將兵拒秦或有所失妾請不立其罪上許之乃遣趙括將四十万人往長平城代廉頗頗怒奔齊矣括乃与秦將王折齓戦齓敗括縱兵逐之秦乃令武安君白起將兵從間道邀擊趙軍又約軍中不令漏泄云武安君白起將兵至長平邀截趙括絶其粮道遮括㱕路括乃与秦軍大戦武安君臨陣乃於陣上謂趙軍曰我是武安君白起也趙卒聞之皆戦懼哭悉不敢戦括乃倒戈降白起起曰趙多変易乃斬括並坑趙卒四十万人血流成水又縱兵攻趙趙王大懼乃使蘇代入秦說應侯范睢睢姤白起功大乃諫秦王令罷兵昭王乃抽武安君兵廻趙遂不滅也元戎謂趙括好讀兵書而䧟於長平也乃趙王恨不用趙豹之言也藺相如曰趙王以名使人如膠柱而鼔折瑟讀得兵書時未熟機変也夫智小謀大事之失也才輕任重得不危乎西園月滿西園夜未央金風不動鄴天涼髙情公子多秋興更領詩人入酔鄉魏志云昔曹操次子名植字子建封東河王後轉封陳思王有大才能七歩成章常与陳琳徐幹楊循王粲應璩劉真䓁七人並有才藝与公子為諸友後魏囯公子折与鄴乃置西園与諸才子夜遊賦詩時号喜客魏文帝立乃欲誅之公子公子乃何作雙折陸初進之帝方令七歩作詩乃免其誅詩曰折煑荳燃荳箕豆在釡中泣一種同根生相煎何太急遂免罪初爲太后怜愛公子文帝欲殺白於太后太后吾不意此子若是此乃由汝囯法也後乃免死夫至靈者人至重者斈不以孔愚才智用之即通漢之即昏此覩前賢寧无惕勵也長沙江上南風起白蘋長沙城郭異咸秦故郷猶自嫌卑濕何況當時賦鵩人漢書云昔賈誼洛陽人也有大才折孝武帝用之帝所問之事諸老夙未言賈誼皆謂其對尽合其節帝以賈誼才能迁太中大夫漸折委公卿之任後景帝舅王信无功帝欲封侯而周亞夫与賈誼皆諌曰髙祖有約非劉氏不封王非功臣不封王非功臣不封侯今信雖皇后兄而无功由是信恨誼乃譛於帝令左遷誼於長沙郡爲長沙王大傅誼至長沙爲土地卑濕不習水土乃疾病有鵋鳥來止誼坐隅誼甚惡之乃作鵬鳥之賦後卒於長沙也夫天子䡖賢時不容哲蓋時不用明者也圯橋廟筭張良獨有餘少年逃難下邳初逡巡不進泥中履争得先生一卷書漢書云留侯張良字子房也代代相韓韓為秦滅良欲為韓報讎不克秦𣣔誅之良逃匿更圯橋見一老人衣黄衣朱履見良擲其履於泥中良遂取履跪而進之老人如此三擲其履良亦三進之老人曰好少年可教之謂良曰來早就此當授汝兵法良至來早至此老人巳在此矣乃口敎良素書三略良授之謂良曰授汝此訣當為王者之師至明視之不見唯有一黄石遂号黄石公素書三略也乃鎮星之精也夫張良籌略衆莫可借非髙祖以不知非張良之不仕故後漢末叔无与彭寵書曰智者順時而動逢理而謀蓋猶君臣道合風雲際㑹也汨羅襄王不用直臣籌放逐南來澤國秋自向波間葬魚腹楚人徒倚濟川舟按史記云騷經曰屈原名平与楚同姓折也為楚襄王佐屈原有大智才能時不可及楚王任之大事當使屈原操憲令之書原操藁未畢文曰創憲令之夲也衆莫能知有上官大夫与原争寵欲取憲草讀之屈原不与因此之由大夫乃讒於王曰王旣令屈原折憲令入衆皆知之原又云非折我不作也楚王聞之怒甚漸踈放之後屈原累遭上官大夫䜛佞以至放遂乃作離騷之辝文曰離者别也騷者愁也屈原至江畔披髪行吟形容枯槁漁父問曰三閭大夫乎何故而至此原曰㪯丗皆濁唯我獨清衆人皆酔唯我獨醒是以見放漁父曰何不渾其泥而揚其波何不餔其折槽而啜其醨而佯其酔原曰吾寧葬江魚腹中矣遂投水而死其江名曰汨羅江也乃五月五日投江後弟子宋玉祭之原託夢云𬒳水族奪之玉乃造舡裝畫之以竹筒盛飯五色線繫之以祭也夫同馬迁書曰凡人有致命者或重於太山或輕於鴻毛若生不遇明君義不相及命重太山也若事賢君相及以義命如鴻毛也三閭大夫此之一死宴為命重矣旣懷深恨万古不銷也青門漢囯東門漢皇提劒滅咸秦亡國諸侯盡是臣唯有東陵守陽節靑門甘作種瓜人漢書云昔秦東陵侯邵平也漢髙祖折㓕秦定天下諸侯入仕漢稱臣唯平不肯仕髙祖甘守閑居自種爪園髙祖議之不能屈之也夫主憂則臣辱主辱即臣死此乃忠臣義士之端故文選曰猛虎處於深山百獸震恐若於陷穽掉尾求義也想滅囯諸侯雖復仕漢食禄取榮豈異半虎於䧟穽者也銅雀臺魏武龍輿逐逝波髙臺空按望陵歌遏雲聲絶悲風起飜向鐏前泣翠娥後漢末魏武帝姓曹名操字孟德為漢相封魏王王於魏囯築髙臺号銅雀臺常与妃女美人登臺望囯内按歌樂後帝崩葬於囯西号西陵其臺上望見而陵美人妃后每登臺望陵而悲泣今在魏郡也夫曹公漢代末年四方鼎沸群雄競奮三主爭興虞丗南魏吴蜀三主優劣論云曹公姧雄多忌至北殺伏后鴆荀卿誅孔融戮崔琰此實謂弃賢得乱丗之才也鼎足之中曹公最劣且死者人之畢饗者礼之規盖恋意一時顯愚千古者矣東晉石頭城下浪摧嵬風起聲疑出地雷何事符堅太相小欲投鞭䇿過江來南史云昔西晋惠王夫取胡羯陵中原蕩覆琅瑘王奔渡江群臣王導等之謀於金陵号曰東晋後数代晋孝武帝時囯小兵弱苻堅乃畨人據長安稱帝囯号秦兵強天下无敵九州之地乃有其八堅持囯大兵強欲興戈兵滅東晋晋有謝安為相秦群臣諌堅云晉有謝安在不可伐也堅曰朕今興兵伐晋如㪯泰山墜一小卵也又諌曰南有大江之隔阻晋未可伐堅又曰朕今興天下之兵二百万衆投鞭於江江可絶流何乃不済遂興兵南伐以弟苻融為將堅亦親征軍至壽陽晋謝安乃㪯姪謝玄并男琰將兵八千拒之至肥水兩岸軍隔岸玄乃遣使告堅請退軍玄漹渡肥水堅揮軍退玄乗勢擊之大勢傾挫遂至囯滅身亡矣此謂堅不良天道折但恃兵強也夫謝安折籌用合聖之旨謀深輔囯之機實為良將而賢佐也吴江子胥今日委東流吳國朝亦古丘大笑夫差諸將相更無人解守蘇州史記云吴王夫差兵強奢侈伍子胥於江上看越兵渡来請懸臣首於囯門上以觀越軍攻破王城吴王如其言賜子胥死而出軍往黄池伐斉未返越相范蠡將兵伐吴不克城上乃有蜂起蠆越軍兵不得惟乃子胥頭懸於此中而有蜂出拒越軍越王巳祭之子胥乃託夢謂越王曰我頭在此由不忍見我吴囯破矣此謂子胥更无人拒也吴人怜之乃為立祠在吴江太湖邊見有子胥山也夫吴王聽讒而殺良臣不祥也䡖才而重佞者執愚也旣亡囯之端乃弃賢之過者也凾谷關司馬迁曰秦斉二囯之間守見在東山也寂寂凾關鏁未開田文車馬出秦來朱門不養三千客誰爲鷄鳴得放廻史記曰斉囯孟常君門下養三千賔客不計貴賤皆分上中下三等因夜食人邀火明者客怒以飰不等輟食謂辝孟常君乃起自持巳食飰比諸賔食皆无異客慙而四方賢士多㱕付之後因使秦秦人說之王曰孟常君族而賢可以因之君乃使人投秦王愛妃得免秦王釋之㱕斉得出奔馳夜半至此関閲法至鷄鳴方開関有下客馮諼乃法鷄鳴是時群鷄皆鳴方出関湏臾秦王果悔令騎追之使至関追不及也故脫秦昭王難也夫孟常君富貴不驕於天下又養士不侍其恩故禍遂身危寧无賢士也武關戰國相持竟不休武關才掩楚王憂出門若取靈均語豈作咸陽一死囚史記曰七囯有諸侯多懼秦王王乃遣使命楚王入武關好㑹楚王従命而行群臣霊均等諫王曰秦乃虎狼之囯今邀入關必不㑹好願王勿去秦未必便興兵入楚楚王曰秦命寡人㑹必无憂苦諌不聽而往至㑹王果𬒳秦虜㱕囚於咸陽不放還楚楚王終丗含悲恨不用靈均之言也春秋後語云智者逹於未萠愚者昧於成事且兩囯折征伐成敗未明各懷耻之辝便言信㑹明之約此謂束腐葦而投烈焰縛鼩鼩而付群猫也垓下抜山力盡勢圗隳倚劒空歌不逝騅明月滿宫天似水那堪廻首別虞姬漢書云項羽垓下大敗漢相張良唱吴楚之歌将士潰散王欲起軍軍巳散矣王乃攬轡備烏騅而出身穿金甲五仗兼備則别虞姬虞姬問曰大王欲何䖏去王曰寡人欲㱕江東起兵虞姬曰妾不能従王亦不能為漢臣妾請王腰間劒王賜美人劒乃將劒自刎而死也夫項羽有抜山之力而震霸道之威運去禍來人之常数也郴縣義帝南遷路入郴國亡身死乱山深不知埋恨窮泉後幾度而陵片月沈漢書云昔秦始皇崩天下乱亡囯諸侯子孫折各復㪯兵楚懷王兵強乃遣劉項二將分兵入秦自約之曰先到為君後到為臣沛公先到項王兵強不伏為臣二主相背共立懷王義帝於江南及劉指鴻溝中分天下項王乃迁義帝於郴縣而殺之帝臨死恨項王不忍為臣殺君漢王聞義帝死乃㪯哀三軍縞素天下聞之並皆㱕漢漢王德之義也夫髙祖經營天下約義成功政四海之頽風為帝王之至禀者也東海東廵玉輦委泉臺徐福艛舩尚未廻自是祖龍先下丗不閞无路到蓬萊史記曰秦始皇併天下後好仙有道士徐福上言東海有三神山山上有仙藥帝乃選童男童女各五百人隨福入海採仙薬未廻始皇東巡沙丘身崩後天下乱徐福不知何之竟不廻矣始皇字祖龍此為仙藥未廻始皇先死也夫蓬萊者群仙窟宅衆聖栖遊參差隱碧玉之樓縹緲見赤龍之駕若非仙侣何以㝷真徐福登舡以暢平之忘祖龍下丗堪嗟温駭之神每觀前書可為蚩笑首陽山孤竹夷齊耻戰争望塵遮道請休兵首陽山倒爲平地應始无人說姓名史記云昔伯夷叔齊乃孤竹君二子皆譲折囯位聞周武賢求仕之時紂毒流天下武王伐之夷齊諌王不使伐紂云臣聞王賢固來仕王今王伐紂為臣伐君臣不忠也武王曰紂昏弃天下暴虐无親皇天降禍朕須伐之二子乃隱首陽山誓不食周粟採白薇而食遂餓死為諌武王不納也此乃襃夷齊之廉節余已為悲也且紂无道誅戮兄弟剖賢人心刳剔孕婦天下怨苦而武王伐之為救憶兆之苦也夫士者有五烈於君子之林修身者智之府推位者仁之端耻辱者勇之決謙謹者義之表立名者行之極也姑蘇臺吴王恃霸弃雄才貪向姑蘇醉醁醅不覺錢塘江上月一宵西送越兵來史記云吴王夫差取越越敗乃進西施請退軍越吴王許之旣得西施王甚寵之謂築姑蘇臺囯内珠玉以崇飾之初王用子胥而覇天下後得西施多遊姑蘇臺宴樂少見子胥子胥謂謀日臣恐姑蘇不乆為麋鹿之遊王不聽子胥遂賜子胥死越王果与范蠡將兵三千一夜西渡至明越兵當吴中軍下營烈陣吴王不意遂𬒳大破之吴囯遂滅矣夫吴囯傾覆而何也且外无良將内乏謀臣聽間茸之儒言棄長者之忠諌聽秦宰伯噽言殺子胥也積年代業一旦沙崩也息城息亡身入楚王家廻首春風一靣花感舊不言長掩淚秪應飜恨有容華春秋云昔息侯𬒳楚王滅擄其妻納為嬪終身不伏笑語感舊夫之意也又烈女傳曰楚擄息囯君使守門欲納夫人夫人作記曰生則同室死則同穴謂我深言其如皎月遂自殺也息君聞之亦自殺矣又近代才子之句息夫人為楚王生二子其理難明蓋斈淺未周也夫上古結繩而治軒轅文字而興以立史官相其褒貶莫不懲惡勸善以激將來諷詠之中尢宜小細若成大謬有誤後人根究其源實難尽美者矣故冝城武安南伐勒秦兵踈鑿功將夏禹并誰爲長渠千載後蠻流猶入故冝城後語云秦將武安君南伐楚一戦而拔鄢郢再戦而楚宫庿三戦而辱楚王後秦以郢為南郡也夫踈鑿長渠以運粮食故帝王略論曰夏禹治水不重尺璧而重寸隂一沬握髪乃一食二吐飱陸行載車泥行乗撬而水行載舟治水十三年經過巳門聞兒泣声不能入恐滯時乃鑿龍伊闕導九江所存者七百囯而鼎天下有何出啚洛出書至壽百歳在位九年夫武安君生於郿人起於秦中善用用功顯於兵甲之陣止於一將之身故胡公豈將咫尺之清流此沙弘之鴻業實見謬矣哉胡曽詠史詩卷第一
