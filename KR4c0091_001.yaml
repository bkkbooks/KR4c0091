front:
  text: 新彫注胡曽詠史詩第一烏江章華臺細腰宫長城沙苑矩橋沙丘石城洞庭江夏荆山陽臺赤壁居延吳宫阿房宫沛中金谷園湘川夷門田横墓鴻門黄金臺夷陵漢江蒼梧陳宫南陽即墨渭濵五湖易水長平西園長沙圯橋汩羅青門銅雀臺東晉吳江凾谷關武關垓下郴縣東海首陽山姑蘓臺夜間楚歌皆思折家郷遂乃各分散矣夫項羽徒負英雄之志全无慷慨之心于時再入江東復興戈㦸零靈日月撥乱寰瀛得失未知由勝束手盖无機略只以勢景章華臺茫茫衰草没章華因笑靈王昔好奢臺圡未乾簫管絶可怜身死野人家史記曰時楚靈王好大奢乃役万姓折築臺起宫以金玉裝飾号章華臺常与美人燕樂於此後出軍伐陳靈折王之兄患折弟王不治囯政乃勒兵閉城攻王王敗軍獨騎奔投野人之家遇鋗人曰与我一食我不食三日矣鋗人謂曰新王下令有飼王者折罪及三族不可置食也旣不得食因枕其股而卧鋗人畏人知之乃以土代股而去靈王飢甚莫能起身死於申亥之家也凡夫勢尽道窮人之常數可以空山就死何以下託甘言此之謂見危而求安不居安而慮危也
