body:
  text: 濡須塢徒向濡須欲受降英雄才略獨无雙天心不与金陵便髙歩何由得渡江後漢末三囯時吴王遺魯折肅収江南擒蜀將􅀜羽先主怒大㪯兵伐吴吴王孫􅁠發兵拒蜀又恐魏發兵攻之乃遣使作魏文帝曹丕興兵百万伐吴至此江江水波濤望見彼岸吴將下營乃歎曰彼有人也吴未可啚抽軍㱕魏故論云興兵百万無尺寸之功乃其將也濡湏乃江名者也檀溪三月襄陽緑草齊王孫相引到檀溪滴盧何處埋龍骨流水依前遶大堤後漢末先主劉備在南陽時夜走折過檀溪溪水深急先主乃乘之馬名滴盧謂妨主也先主臨難急抱馬髪呼之曰滴盧滴盧今日果折敗於吾也馬乃竦身躍過此溪先主遂免難其溪也按史記云溪闊三丈二尺見今在㐮陽者是也青塚玉皃元期漢帝招誰知西嫁怨天嬌至今靑塚愁雲起疑是佳人恨未銷前漢書云昔王昭君有絶丗之色為漢折元帝妃時西藩強請㛰於漢帝乃嫁昭君於藩昭君到藩怨藩腥醜非昊也百日而死藩怜之遂葬於漢界今号青塚乃王昭君墓也姓王名嬌已李陵臺北入單于万里疆五千兵敗滯窮荒英雄不伏蠻夷死更築髙臺望故郷前漢將李陵五千歩卒深入虜折庭􅀾匈奴大敗後数日救軍不至陵兵計窮人无才鐵乃降單于後武帝誅陵老母少妻一男一女陵求折㱕漢不得乃於藩中築臺髙望漢関也臺今見在於藩界也前漢望鄉臺也文選曰李陵与蘇武書曰吾以五千之衆敵十万之師勞疲乏兵闘斬覇之馬斯言寡矣且東晉行軍謝安以八千之士破百万之師陵訴五千之士對十万之師未為多矣故六乃曰用兵有五危十過者將之罪也􅀌兵深入此之一危將有勇而輕死此之一過也皆由自作余􅀚李陵臨危苟命与藩為属雖有勇才未為良將者也河梁漢家英傑出皇都擕手河梁話入不是子卿全大節也應低首拜單于前漢武帝命􅂫武持節北入藩而公卿餞送於何梁而李陵執􅂫武手謂曰子至虜庭无低大囯之節武曰至彼欲平交於單于不伏先拜折􅀍囚於北海之上牧羊一十九年而返終不伏拜也子卿乃􅂫武字也夫堅貞之質雖百錬而不銷􅊊荗之姿實四時而弥翠此皆志節之士方以比倫也軹道漢祖西來秉白毛子嬰宗廟委波濤誰怜君有翻身術解向秦宫殺趙髙後語云昔秦皇崩趙髙事少子胡亥帝用髙為丞相天下乱盗賊起帝頻以盗賊之事責髙懼誅乃煞帝而立子嬰為王及漢軍至髙頻請子嬰出欲害之子嬰不往髙自至見子嬰乃煞趙髙於秦宫以謝天下漢軍乃至子嬰乃銜璧而降漢王漢王不煞後項羽至乃煞之軹道為子嬰伏於路傍車跡中矣此謂趙髙北入煞子嬰不疑翻􅀍子嬰煞之夫趙髙姧佞為機虐毒為主文選選曰人忌盈滿下之陵上則􅀑神折之此之是也秦皇酷法峻刑弃人人縦志有焚籍坑儒之過信長城泛海之愚二主囯亡巳為晚矣上蔡上蔡東門狡兎肥李斯何事忘南㱕功成不解謀身退直待雲陽血染衣史記云昔李斯相秦始皇用斯計破六囯後秦皇拜斯為丞相及始皇崩斯与趙髙謀胡亥充二丗皇帝帝用趙髙䜛而殺李斯斯臨刑歎息謂子曰吾与折汝常出黄大臂角鷹出上蔡東門无日矣此李斯莊路謂斯佐始皇破六囯功成不解退身㱕閑遂遭刑戮夫功成名遂事立家全捨富貴而㱕故園者此之賢人也君不見越相鴟夷子家全而名存者也漢宫明妃逺嫁泣西風玉莇雙垂出漢宫何事將軍封万户􅁍令紅粉爲和戎前漢元帝遣王昭君出和藩昭君泣而奏曰大將軍封万户何不為囯平戎􅁍令臣妾和也玉筯雙垂乃昭君泣淚而去預譲橋預譲酬恩歳巳深髙名不朽到如今年年橋上行人過誰有當時囯士心史記云預譲義士也先仕􅀳卿范中折行後中行伐祖智伯滅之譲回仕智伯智伯亦􅀳卿也智伯兵強請地於韓韓宣与之又攻魏魏侯不与或諌曰与之以驕智伯智伯􅂢必凌大囯是必危矣魏候与之智伯果驕請地於趙趙㐮子不与智伯乃驅韓魏二軍圍趙􅀳陽城引水而浸趙城令韓魏之軍守堤㐮子患之乃使人􅀃韓魏囯智伯恃強軍衆一旦破趙即韓魏豈存也今可魏反於内趙攻於外韓翻決水而灌智伯不然我三囯必破滅也韓魏許之遂滅智伯韓趙魏三囯分智伯之地危智伯遂滅預譲感智伯恩欲㐮子潜伏劒於厠襄子欲登厠恐有人乃令折捜之獲預譲襄子感其義士不煞賜金而遣之譲投金於水乃入山漆身吞炭為啞㱕家妻子不識唯友人識之謂曰何不回仕襄子而啚之譲曰若仕之能忍殺主也遂伏劒於橋下候襄子過㐮子又謂左右曰馬驚无辜得无預譲也乃令捜之果獲預譲㐮子曰卿先仕范中行也而智伯所滅何不為范中行報讎今寡人滅智伯而子獨為智伯報讎譲曰昔范中行以衆人遇我我以衆人報之今智伯以囯士遇我我以囯士報之襄子感其義又捨之不煞譲曰君前放臣又今捨臣臣生不能報智伯可以泉下報之願得君衣擊而死矣㐮子義之乃解謝身衣与之譲乃三呼三擊其衣然後而自刎也古書云􅁈成避海讎不共天夫􅃡想囯士之心倍激匹夫之志也漢中荆􅁄蒼蒼漢水湄將壇煙草覆餘基適來投石空江上猶似龍顔納鍊時昔漢王初興時蕭何諌請築壇拜韓信為將而定天下其壇今在菅漢中興元府為郡鄭縣也此美漢王之聖明一納蕭何之諌拜韓信為將巳得天下遂定華亭陸機西没洛陽城吴囯春風草又青惆悵月中千歳鶴夜來猶為唳華亭西晉史云昔陸機并弟折陸雲並有才祖父昔折為吴囯將相後晉滅吴陸機兄弟仕晉及恵帝時八王牙㪯機為晉成都士潁之將与長沙王又􅀾夫利􅀍譛潁煞之折臨刑謂弟曰華亭鶴唳不復聞矣華亭乃是陸機夲莊宅池亭也夫日月虧盈人道興廢此之常也何更歎哉尔雅云君子居安思危小人臨禍待死故可追求事之前不可追求事之後者也彭澤英傑那甘屈下寮便栽門栁事蕭條鳯凰不共雞争食莫恠先生􅂴折腰史曰陶潜字淵明為彭澤令時折郡遣督郵至縣縣吏當來束帶見之潜歎曰我不能以五斗米折腰閭渠兒哉乃解印綬遂㱕田門植折五栁慕采菊之娱命筆作㱕去來篇在文選二十三卷也夫囯之任人由匠之用木先度材噐令合規儀且陶潜之噐能何以一令之可乎致使捨位㱕田豈不是囯有弃賢之名哉于時若令陶先生位列公卿名當廟食歩彤摨而揖譲入青􅃈而雍容未必有㱕去來辝蓋由噐重位卑屈求英俊也武昌王濬戈鋋發上流武昌鴻業土崩秋思量䥫鏁真兒􅃧誰爲吴王劃此籌西􅀳書云昔吴王孫皓不修囯政躭惑酒色􅀳龍􅋮將軍王濬字上治為益郡太守詔令造戰舩東下伐吴吴王使人於江險處悉以鐵鏁横截其江又作鐵錐暗置水中以拒舡舸王濬乃作水筏十數万廣百餘歩縛草爲人􅀍甲持器令善水者以筏先行至中流果遇鐡錐筏錐筏􅂺生又作炬長十丈小圓􅈅以麻油在舩前遇錐燃炬以燒之湏􅁷銷融断絶是以舡流悉无所礙乃破武昌擒吴王㱕􅀳封歸命侯吴遂滅矣武昌今鄂州也夫治囯者務在人牢人牢則囯固設巨功而為備及事極以无功故曰在德不在險此之是也豈得謬矣鴻溝虎倦龍疲白刃秋兩分天下指鴻溝項王不覺英雄挫欲向彭門酔玉樓劉項爭天下指鴻溝水為折二囯之界亭分天下漢取水之西項取水之東項王徐州彭城後垓下大破項王囯滅身亡也彭門今徐州也夫項羽持其威力􅁒取天下是故揮㦸万夫不如一德德者立囯之夲力者亡囯之原盖无良佐謀臣益致銷樂者也東山五馬南浮一化龍謝安入相此山空不知擕妓重來日幾樹鸎啼谷口風晉史云惠帝不修朝政只多誅戮忠良是八王遞相㪯兵相持所以胡賊憑陵擄天子入平陽焚燒京邑時王子五人出奔南渡其王子姓司馬時号王馬也中有折瑯瑘王子一人聰明竒偉納忠臣王導之謀遂營都金陵号東晉立為元帝帝後数代至孝武折帝時有謝折安隱於東山乃賢士也入晉為武帝之相帝任謝安之謀大破胡賊秦王符堅百万之兵於肥水東安後携華盛㱕此故為重來東山今信都郡越州是也夫非賢不輔其聖非聖不任其賢故得士者昌前主所重也涿鹿涿鹿茫茫白草秋軒轅曽此破􅃖尤丹霞遥映祠前水疑是成川血尚流史記軒轅皇帝垂衣治天下為舟檝以濟不通乗馬伏牛始立陳宇作杵曰以利万民制􅀌矢以威天下時􅃖尤爲暴黄帝造戈㦸鼙折鼔破􅃖尤於􅃰鹿自此漸有兵甲也夫先聖之宗以物利人前王之英冝囯者不可不設備不可不上師是乃戈於武庫偃甲於戎利用之取捨唯在德乎雲夢在楚西界漢祖聽䜛不可防僞遊韓信果罹殃十年辛苦平天下何事生擒入帝鄉漢書云髙祖定天下後封韓信為楚王有人告云韓信欲反髙祖乃謂陳平曰如何平曰今陛下兵与信如何帝曰不如也平曰人告信反陛下折信耶帝曰奈何平曰古者天子廵狩諸侯㑹朝而楚有雲夢澤可詐逰之信必來朝乃令武士擒之靣斬也髙祖從其計遂遊雲夢信果折朝帝帝令武士擒之信曰何罪帝曰卿欲反信曰臣若意反豈朝陛下帝遂不斬乃縛於車中載㱕長安捨而封淮隂也信本无反意為此之後常傷心為无罪楚王也故文選有功臣頌曰竒謀六出嘉慮四迴言陳平也周易曰見機而作不俟終日也且韓信在楚即漢懼在漢即楚怕二君之命計在巳為奈何不為致遭羅網豈不痛哉孟津秋風颯颯孟津頭立馬沙邊看水流見􅀃武王東渡日戎衣曽此叱陽侯史記云昔周武王伐紂至孟津河天下諸侯人一日不期而㑹同往伐紂惟陽侯後至武王河北之諸侯莫不驚懼武王之威德旣剋紂封比干之墓釋箕子囚㱕頌故宫人散鹿臺之財㱕馬于華山之陽放牛於桃林之野戈鋋不復用也夫囯者以賢為夲弃賢則囯亡也七里灘七里青灘映石層九天星象感嚴陵釣魚臺上无絲竹不是髙人誰􅄙登後漢史云嚴光字子陵南陵人也与光武皇帝折布衣時交友後帝定天下而子陵之賢不仕常垂釣於南陽七里灘帝折詔入闕与帝折語話令至夜与帝同塌而卧以􅂰壓帝􅅐腹明旦太史奏云昨夜客星犯帝座請防慎帝大笑而曰乃朕故人子陵昨夜以膝壓朕腹也後却㱕南陽閑居垂釣不貪榮禄名位也夫嚴子陵者无好爵之心有清閑之興莫不欶流枕石折在紐蘭誰无譲位之名寔有隠淪之節也初王躬不至帝後車駕並館省子陵子陵不起帝撫其背曰子陵不相助為政故自守志何相追乎霸陵原頭日落雪邊雲猶放韓廬逐兎羣況是四方无事日霸陵誰識舊將軍漢書折將軍李廣有罪免官􅀻第莊居覇上廣遊獵㱕夜過覇橋橋令曰何人犯夜廣曰舊將軍也令曰今將軍猶不折得誰知你舊將軍遂縛廣於橋柱至明始放廣後復為將乃捉橋令而射煞之也夫騏驎垂耳於坰放鴻鵠戢翼於汚池飛即摩宵行即千里何駑騫䲭鳶之所欺者也殺谷子舉國賢良尽淚垂扶􅂫屈死樹邊時至今谷口泉嗚咽猶似秦人恨李斯後語云秦皇无道有太子扶􅂫頻諌帝帝怒遣往胡監􅂪恬築長城後始皇臨崩使趙髙賫詔詔扶􅂫㱕咸陽立之為嗣髙乃与丞相李斯謀藏詔書折而遣使詐勅賜扶􅂫死使至􅂫受詔蒙恬曰今天子出逰於外而賜殿下死朝廷必有変今北有四十万軍請伏兵問罪然後死之太子孰知煞罪且為人之子安欲抗其父􅂫乃自煞之秦囯賢良皆垂淚而憶太子而恨李斯詐􅃙蓋囯相不為綱紀益致折於斯也夫懐才受死在惡誅賢忠臣譲齊以无甘義士負戈而長歎者乎馬陵墜葉䔥䔥九月天駈嬴獨過馬陵前路傍古木䖝書處記得將軍破敵年史記云孫臏与龎㳙為友而臏事魏先達乃薦㳙為將㳙乃􅀒心譛魏王令刖孫臏手足臏乃膝奔投齊於馬陵㳙乃將兵進臏圍馬陵臏乃刻樹而􅂐折書云龐㳙死於此樹下魏人而見不識報㳙㳙曰此孫子之書非吾不識乃夜秉燭往看之而臏乃排万弩候㳙㳙果至乃以万弩齊射煞㳙魏軍大敗乃孫子之計許子新書曰善陣不􅀾者良將也夫魏衆於馬陵先謀滅龍韜龐㳙於樹下破自書文莫不取敵㪍聞持名万代也嶓塚夏禹崩來一万秋水從嶓塚至今流當時􅀂訴胼胝苦更使何人別九州史曰夏禹氏之墓也禹治水九年折其功不成堯放之於羽山至舜乃㪯禹治水苦身戮力足有胼胝不訴其苦乃成功矣帝王略論曰夏禹之世敷九士乗四載立万囯定九州其功至矣夫禹帝之王天下也兢兢而有如馭朽惕惕而无異履氷莫不以義治幽化周動植也玉門􅀜西戎不敢過天山定逺功成白馬閑夜帳中停燭坐唯思生入玉門関後漢云班超有鷰折鎮遂投鎮邊四十年西戎未敢折従戎征西戎有㓛封定逺侯之囯家不差替超乃修書与其姊曰超鎮北年深身老疾病囯家无替人當恐死於邊塞每想得生入玉門閞死无恨矣其後伐秦遂得替㱕生入閞矣夫功髙定逺業重安邊莫不揔衿帶以靜壃据喉咽而設險也昆陽師克猶來在恊和䔥王兵馬固无多誰知大敵昆陽敗却􅀏前朝用楚􅁔後漢書云王莾時劉聖公稱漢帝於兖郡光武興於昆陽而莽乃興發大軍討之遣弟王㝷王邑將兵百万乃悉徴天下兵法六十餘家六百餘人駈猛􅀾以助軍威鼙鼔動地干聞二百餘里㝷邑至昆陽圍光武數十重光武兵弱而欲降㝷邑㝷邑不肯光武乃益堅諸將出兵却􅀾㝷邑㝷邑大敗光武乃斬㝷邑悉坑百万之衆弃甲斉山劉聖公以光武功封為䔥王王後自立􅁛後丗祖皇帝天下遂定夫師克在和不在衆將士在機不在猛雖為籌略由託天時也蓋王莽撥乱中原淩掠四靣雖為結衆不義者多故孔子曰不義而富且貴於我如浮雲此之是也何將妖而勝德乎長安関東新破項王㱕赤幟悠􅀭日月旗從此漢家无敵囯爭教彭越受誅夷史記列傳曰彭越字仲初起於巨野也為群盗尔雅曰魯時漢初楚越有人言越天下豪傑相立叛也秦公可効之越觀時未動也方令折兩龍在巨野盛闘且待􅀚時也後漢髙人伐武越乃明之言英曰之才巳盛吾可出矣後佐漢平項羽功畢乃封越為梁王旣四万无敵髙祖疑越作乱故以隂謀誅之彭越遭戮於長安也夫英雄􅔡力豺虎當逺列戈㦸於江山布棔霾以日月赴于時㢙秋霜之㦸盡忠節之誠一旦清平翻禍及巳􅃡思効積深為下哉望夫石一上清山便化身不知何代怨離人古來節婦皆銷朽獨尔不爲泉下塵按列女傳曰昔有貞婦以其夫従征逺方相餞至此山望其夫去乃化身為石丗􅀃望夫山在昌武郡新野縣北不記年代故胡公云不知何代之句也夫至霊者人至堅者石心堅而化石致万古不銷也滹沱河光武經營業未興王郎兵革整慿陵須知後漢功臣力不及滹沱一片氷後漢書云光武皇帝折征河北􅀍賊王郎子敗於邯鄲帝欲南奔過河時氷銷黄河流浪起不可過帝使王霸視之霸至河河水猛流霸乃祝河神令凍河果凍合霸廻見帝奏云河凍冰結後渡得矣皇帝与諸將兵丁遂過免難後復大破王郎即此皆王霸之智術也滹沱河乃黄河也黄河博望沉埋不復旋黄河依舊水茫然㳂流欲共牛郎語只待霊槎送上天按博物志云天何与海通海濵年年至八月有孚槎來往不失斯信此人乃是博望侯張騫也多賫粮折食乗槎去忽忽不斍晝夜奄至一處見城郭居室望見室中多織女只有丈夫牽牛臨渚不飲乃問之此人何由至此騫乃問此何処所荅曰君可往蜀問嚴君平乃如其言君平曰某年折月日有客星犯斗牛恰是至今天河是也夫天地􅀇隔仙俗道殊旣犯斗牛豈非凡士必是竒人也東門何人知足反田廬玉管東門餞二踈豈是不榮天子禄後賢那使乆閑居昔漢太子少傅踈廣太子少傅踈壽乃廣之兄也語免官退位樂閑居也鳯凰臺秦娥一別鳯凰臺東入青􅁳更不廻空有玉簫千載後遺声時到丗間來史記云秦穆公女折名弄玉善吹蕭与其夫蕭史共登樓吹蕭作鳳凰之音感鳯凰従天而降迎之昇仙也莫知所止夫迎縹緲之姿入青􅁳之路往瑶池而不返翫􅀇圃以忘㱕莫不玉質見天清名不朽也廻中武皇无路及崑丘青鳥西沉隴樹秋欲問生前躬祀日幾煩龍駕到涇州漢書云武帝好神仙之術乃築靈臺設􅀕西王母感得王母与帝將仙桃下至漢宫初王母欲下先有青鳥一􅀟凾書報帝後帝与王母相見後昇雲駕而去帝於涇州立祠親幸祭祀竟不現矣廻中乃立祠處地名也夫仙者杳􅁳之路崆峒之門非乗龍而莫往何恃貴而能求始皇恱思於三山終殯骸於沙丘漢武懃心於无轉竟埋骨於茂陵非積功累德錬行修真志感生靈名顯瑶􅁽也五丈原蜀相西駈十万來秋風原下乆徘徊長星不為英雄住半夜流光落九垓志云武侯諸􅁑亮將蜀軍曰北伐魏魏明帝遣司馬仲逹拒之仲逹蜀軍於五丈蜀原下營即死地也遂関城不出􅀾武侯患之居􅀊夜有長星墜落於原武侯病卒而㱕臨終為儀曰吾死之後可以米七粒并水於口中手把筆并兵書心前安鏡下以土明燈其頭坐昇而㱕仲逹占之云未死有百姓告云武侯巳死仲逹又占之云未死竟不敢趂之遂全軍㱕蜀也夫諸􅁑孔明者佐時囯囯立事持名有金石不朽之功實折鍾鼎名勲之望而又威楊四海責盛而朝数尽善終可謂美也泜水韓信經營按鏌鎁臨戎叱吒有誰加猶疑轉戰逢勍敵更向軍中問左車漢書云韓信伐趙趙王号成安君有謀臣李左車封廣武君多智足計趙王不用其計􅀍韓信破之信破趙乃令軍中曰有人生獲李左車當賞千金若煞之當加罪折左車乃生投信信得左車置於軍中而取其計䇿後用左車計伐斉斉王投楚霸王遣龍沮二十万軍伐信折信乃作土嚢擁水渡兵攻斉城而信佯敗是軍乃折進軍渡水逐信信乃决土嚢水泛浸楚軍軍大敗斬楚將龍沮於陣上逐斉王田横奔海島信乃為斉王此李左車諆也夫韓信者従師之取計智益如矣襃城恃寵嬌多得自由􅌐山舉火戲諸侯秖知一􅀏傾人囯不覺塵滿玉楼史記云周幽王將兵伐襃囯襃侯以女進之名褒姒姒有妖艶王好寵之王遂廢由皇后遣兵伐申侯申侯乃与西戎攻王而欲殺王王与諸侯期約曰若有寇即於􅌐山之上擊鼔㪯烽火須㑹兵相救後幽王寵褒姒姒不􅀏王欲要其􅀏乃擊鼔㪯烽告為有寇諸侯乃奔於􅌐山救主諸侯兵至无冦褒姒乃大􅀏後果申侯与西戎伐王王急連㪯烽告諸侯諸侯皆為王只欲要褒姒大笑而並不至王城遂破太子東走投􅀳􅀳侯立為洛陽号東周折謚為平王也夫王愚重色而囯亡主聖任賢而祚永每􅀚上古皆因声色而至禍焉平城漢帝西征䧟虜塵一朝圍􅄙議和親當時巳有吹毛劒何事无人殺奉春漢書云髙祖親佂北畨三十万人䧟於平陽城乃􅀍畨軍圍七日絶粮時奉春君婁敬設計欲以魯无公主和畨畨圍不􅄙陳平乃上計此生軍囯城乃燕支皇后后始可報云欲送美人一􅀟上单于令奪汝寵也汝苦解圍放我㱕我當不献美人遂刻木作美女一雙衣以錦綺之衣繫以繩掣令作舞於樓上畨后信之許開圍放髙祖至閞髙祖又不去后謂曰吾開圍放你漢帝㱕去何乃不行陳平謂曰我軍􅀍圍絶粮七日今將士飢去不得尔番后乃送牛羊粮食而送城内漢帝得食遂宴設六軍而㱕遂免難乃用陳平之竒計今儡傀子是也其時奉春君以公主許单于乃畨后益怒也又髙祖西征乃奉春之君婁敬之封也汴水千里長河一旦開亡隋波浪九天來錦帆未落干戈起惆悵龍舟更不廻史記云隋􅌆帝初生有赤光折照室紫氣盈庭有智仙后曰非常之子也後果授禅天下役天下万姓開鑿渭河穿入汴河通淮長安千里兩岸築堤堤上栽栁帝乃造舡二千隻皆作龍獸之形五彩裝􅀞号曰龍舟繫以錦帆号曰錦䌫至大業十三年春三月帝与䔥皇后及後宫妃諸王六宫乗舟􅁔舞東下渭水至於淮陽注江都未返而天下大乱盗賊李宻䓁三十六処皆稱王是􅀊唐髙祖為太源留守乃㪯義兵討賊入長安􅌆帝在江東而六軍思㱕長安乃反䕶軍軍將宇文化及兄弟䓁為逆滅􅌆帝於江都隋遂滅矣而帝東逰錦帆未卷而唐義兵巳起六宫妃主竟不還長安矣旣􅀍殺而䔥后折官門作棺埋帝後天下定髙祖立使葬帝於吴公臺下也夫􅌆帝錦帆泛舸五􅃹沸空雖為當代之奢華深作後賢之嗤誚金陵侯景長駈十万人可怜梁武坐蒙塵生前不得空王力徒向金田自捨身南史云梁武帝姓蕭名衍字升達重項駢頭右手有文郁閏州金陵縣人侯景即北斉神武帝髙驩下將也驩崩景不伏事驩子澄澄遣慕容紹宗討景景敗而降梁梁朝群臣皆諌武帝不使受景降帝不納諫而受侯景降後二年景㪯兵圍攻武帝帝好佛法仍与群臣閉城每景攻城時帝集群臣於善法堂擊天鼔大念摩訶般苦波羅宻􅁒令賊退帝謂群臣曰經中云阿修羅每攻天帝釋帝釋天鼓自鳴念佛修羅自退及侯景攻倫臺城帝彼景廢囚於金田餓煞之故論云昔趙城納馮亭有長平之禍梁受侯景成水旱之災梁囯為因侯景之禍梁遂滅矣夫万乗之君為匹夫之好而志堅十善性酷二空兾彰弱懦之名果有篡奪之事帝王之道凡欲修善以􅀪済為懷以寛恕為躰一物失所如巳不達此之道也何煩髓腦之勞􅁒致昇平之代也昆明池在長安西門外欲出昆明万里師漢皇習戰此穿池如何一靣啚攻取不念生靈氣力疲漢書云孝武帝好征伐而􅁒過海征昆菕囯其囯逺去万里隔海四面懸絶帝乃於長安開池廣四十里号昆明池帝於池中教習漢軍水􅀾意在速征天下生靈疲困為帝勞役也後竟不往其池今見在焉夫帝道者澤􅀍死恨化行有荒行災星退往沵氣潜銷流舜海而閏祜布堯恩而煦物自可四夷入貢九士􅂬心何假中興鄱為習􅀾蘭臺宫遟遟春日滿長空立囯離宫蔓草中宋玉不憂人事變從遊那賦大王風史記云楚襄王好於離宫遊旣多与宋玉遊此時怱登樓有微風起王謂宋玉曰此風頻調宋玉素有文才乃對曰此實大王風也王曰風者无情何以知之曰風實别臣請賦之在文選中也夫宋玉者斈窮義府文瞻詞林不假􅁝桐自合宫啇之韻无劳機杼能為錦繡之文也金牛驛山嶺千重擁蜀門成都別是一乾坤五丁不鑿金牛路秦惠何由得併吞蜀記曰昔蜀中无路入秦秦惠王聞蜀有五丁力士壯勇乃以鐵作牛五頭詐􅀭其牛雖食粟而每日糞金各三斗矣蜀侯聞之貪金乃使五丁開小作路入秦取牛五丁旣入秦得牛視之果知是詐路且通矣後五丁死秦惠王乃遣張儀將兵伐蜀蜀遂滅矣夫産蚕食者囯之夲牛糞金者事之妖何弃是而取非蓋貪利而致害何愚騃之甚邪望思臺太子銜􅁈去不廻臨皐從築望思臺至今漢武銷魂處猶有悲風木上來漢史云武帝時佞臣江充与太子戾有􅂩乃讃太子座辜作木人埋之帝使充於太子宫掘得桐木人太子无以自明乃謂充曰趙廣欲乱王父子也乃斬之帝怒遣丞相擊之太子敗奔胡自殺後帝知太子􅁈乃追念之為築臺於胡地号望思臺也邯鄲曉入邯鄲十里春東風吹下玉樓塵青娥莫恠頻含􅀏記得當年失歩人史曰趙囯公子平原君名勝門延賔客数千人君家樓臨市市有躄者槃散行急平原美人居樓上􅀏之明日躄者至君門謂曰臣聞君子好事不逺千里而至者以君能貴士而賤妾也臣不幸有罷􅽉之疾史曰腰曲是也而使美人􅀏臣臣願得􅀏臣者頭也平原􅀏曰􅀚此竪子欲以一􅀏煞吾美人也􅀴歳而門下賔客去何多也門下一人前白君曰不殺􅀏躄者謂君爱色而賤士士即去矣平原乃斬􅀏躄者首送躄者賔客乃仍折舊復集矣故文選孔子㪯曰夫玉珠无足而自至者以人好之豈賢士有足者平也箕山寂寂箕山春復秋更无人到此溪頭弃瓢岩畔中宵月千古空聞屬許由古史云許由賢人隱折於箕山讀書堯帝使人召之欲以天下禪位於由由曰不願聞喧煩之事遂臨河洗耳常以手掬泉飲之後巢父取一瓢贈由令由折盛泉飲之由掛瓢於樹其瓢空􅀍風吹之作声由以其瓢鳴喧乃弃之於岩下也夫皓鶴者非幽墳而下栖鴛鶵者非醴泉而折不飲若処之於煩小食之以珎羞者豈可得之也洛陽石勒童年有戰機洛陽長􅀏􅀝門時􅀳朝不是王夷甫大智何由得預知晉史曰石勒者是胡奴也少童時為人把馬於洛陽城東門􅀝門長􅀏􅀳相王夷甫入朝遇見乃曰胡鶵乱中原也乃令捕之不獲勒後為劉聦下將將兵入洛陽打晉懷帝而殺夷甫天下遂大乱矣此謂王夷甫先預知石勒後乱中原也去志大必有巨德王行雖言異志豈可拘後故在將來者矣髙陽路入髙陽感􅐱生逢時長揖便論兵最怜伏軾東遊日下盡齊王七十城史記列傳曰􅐱食其身長八尺生好折讀書家夲落魄无以為衣食人皆以為狂生後因沛公慢人而易人多大略此真吾所願願見之乃見沛公沛公方使二女洗足見酈生酈生入即長揖不拜曰足下待欲勒秦攻諸侯破秦也沛公罵曰咄竪儒今天下司滅秦乆矣向謂助秦耶􅐱生曰必􅁒殺陡合義兵殊无道不宜踞見長者乎沛公起輟洗足貝衣延􅐱生坐慙謝之後為漢王下斉七十城也夫􅐱生者舌有如篁之巧志唯金石之堅雖日下斉之功老子曰大辨苦訥故不謬哉㑹稽山越王軍敗巳山捿豈望全生出㑹稽何事夫差无逺慮更開羅網放鯨鯢史記越王勾踐與吴王夫差􅀾越王敗走投㑹稽山吴王圍之乃用范蠡之計便將西施献吴王請退之吴王許之伍子胥諌曰今越王軍敗弃城投山此乃兵困甚矣願王勿退急攻之越滅即西施自至其吴不然後恨且越王任於范蠡賢相也吴王不納子胥諌遂取西施而開圍放越王㱕越王旣免難乃群臣同心候子胥死子胥果􅀍誅之越王知子胥死乃遣范蠡將兵滅吴吴破而西施􅁍㱕越也夫越用折范蠡􅀗囯再興趙用陳餘致身遂滅是以賢与不賢相去逺哉邵陵小白匡周入楚郊楚王雄霸亦咆哮不師管仲爲謀主爭敢言徴縮酒茅春秋云齊桓公名小白用管爲將一匡天下諸侯有不貢問王而桓公征之王有相滅者桓公救之時楚成王恃兵強不肯包茅桓公乃征楚成王王拒之於南陵戰楚王遣屈原謂公曰何罪而見征桓公曰包茅不貢王祭器不金昔昭王不返吾所問罪楚王曰包茅不入寡君之過也昭王不返請問諸水濵楚之濵也令請入貢昭王返自是先伐請問水濵桓公遂退不周山共工爭帝力窮秋因此􅂢生觸不周遂使丗間多感客至今哀怨水東流史記云共工氏兵強兇暴而与堯帝爭功戰敗力窮乃以頭觸不周山而死天柱為之折也女媧煉五色石而􅀘天也故東傾而水流也胡曽詠史詩卷第二
