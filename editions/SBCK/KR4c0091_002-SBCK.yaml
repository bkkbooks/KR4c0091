front:
  text: 胡曽詠史詩卷第二五十首成都濡須塢檀溪青􅊘李陵臺河梁軹道上蔡漢宫豫譲橋漢中華亭彭澤武昌鴻溝東山􅃰鹿雲夢孟津七里灘霸陵殺子谷馬陵嶓冢玉門􅀜昆陵長安淲沱河望夫石黄河東門鳯皇臺廻中五丈原泣水襃城平城汴水金陵昆明池蘭臺宫金牛驛望思臺邯鄆箕山洛陽髙陽㑹稽山邵陵不周山成都杜宇曽爲蜀帝王化禽飛去舊城荒年年來叫桃花月似向春風訴囯亡昔蜀王姓杜名宇按蜀王羽化為鳥今杜䳌鳥是也
  hash: sha256:286a8ea076a2e74f4be47dac5a222131946b9b4aa02a77598ba765a6b2924571
