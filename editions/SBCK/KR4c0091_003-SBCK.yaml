front:
  text: 胡曽詠史詩卷第三五十首磨笄山官渡虞坂秦庭延平津金義嶺瑶池啇郊銅柱関西畨禺咸陽髙陽池瀘水云亭細栁營葉縣射熊館頴川八公山夾谷杜郵柯亭綿山葛陂鄧城驌驦陂栢舉緱山塗山䂊州愽浪沙隴西白帝城灞岸濮水魯城房陵牛渚癈丘山朝􅁔谷口武陵溪流沙大澤傅巖澠池峴山四皓滎陽磨笄山春草綿綿岱曰低山邊立馬歎磨笄黄鸎也似追前事來向夫人死處啼春秋云昔趙侯其子㐮子伐岱侯侯戰㐮子於岱山之下岱侯􅀍襄子煞之岱侯妻乃趙侯之女也聞夫􅀍擒乃將兵往救之至此山聞夫巳死乃下馬於頭上抽笄磨而自刺死趙雖併國矣今之岱州鴈門郡是也夫見危致命視死无難緬惟琴瑟之情不異椿松之節此實謂大夫之女也官渡夲初屈指定中華官渡相持勒虎牙若使許悠財用足山河爭得属曹家魏志云兾州􅀽紹字夲􅀄兵強而欲啚天下曹公拒之官渡兵強粮壯曹公兵弱粮少曹公患之紹下臣許悠多計貪財而好色不治紹留逢紀佐其子知留後而許悠犯法逢紀收許悠家産悠奔曹公公聞許悠至乃倒屣絶食而迎之撫其背子來吾事讎矣曹公乃用許悠之計絶􅀽紹後軍輜重紹軍大敗紹乃憤恨而死天下遂㱕曹氏皆悠計也
