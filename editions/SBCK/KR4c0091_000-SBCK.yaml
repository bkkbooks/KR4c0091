front:
  text: 注詠史詩揔一百五十首
  hash: sha256:71416ac7e01a40d8765e1237125ffb8353f93d05a3b694e322ae1f044d49687b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0091_SBCK_000-1a}
body:
  text: 前進士胡曽著述并序邵陽叟陳蓋注詩京兆郡米崇􅁻評注并續序夫詩者蓋美盛德之形容刺衰政之荒怠非徒尚綺麗瑰􅄾而巳故言之者無罪讀之者足以自戒觀乎漢子晉宋詩人佳句名篇雖則妙絶而發言指要亦巳踈齊代旣失􅁤範史記云南齊武帝不好詩書謂侍臣曰朕巫祝之安用讀此􅀑錄謂書中古人皆􅀑梁武帝朝却興文也梁朝文加穿鑿八病興而六義壞聲律崔雅崩良不能也曽不揣庸􅋘轉采前王得失古今成一百五十首爲上中下三卷便以首昌相次不以先雖則譏諷古人實欲裨補當代庶幾與大雅相近者也米公續序余聞玉就琢而成器人從學以方知是乃車胤聚螢孫康映雪毎思百氏爰及九流皆由博識於一時故得馨香於千古余非士族跡本和門徒堅暗昧之材謬積討論之志莫不采㝷往䇿歷覽前書黄帝方立史官蒼頡始爲文字旣有墳籍可得而言近代前進士胡公名曽著詠史律詩一百五十篇分爲三卷余自丱歳以來備甞諷誦可爲是非㒺墜襃貶合儀酷究佳篇實深降歎管窺天而智小蠡測海而理乖敢課顓愚逐篇評解用顯前賢之旨粗裨當代之聞取誚髙明庶幾奉古云爾
  hash: sha256:a8e1a504708872cffd1696b1672ad545ebfeaea9a299b03783277cc240190bdd
